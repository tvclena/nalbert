<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Gestor de Conversas • Mercatto Delícia</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#0f172a;
--sidebar:#111827;
--chat:#020617;
--card:#1e293b;
--border:#334155;
--text:#f1f5f9;
--muted:#94a3b8;
--brand:#22c55e;
--danger:#ef4444;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:380px;
background:var(--sidebar);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
}

.header{
padding:20px;
font-weight:800;
font-size:18px;
border-bottom:1px solid var(--border);
letter-spacing:.5px;
}

.search{
padding:14px;
border-bottom:1px solid var(--border);
}

.search input{
width:100%;
padding:12px 14px;
border-radius:10px;
border:none;
background:#020617;
color:white;
font-size:14px;
outline:none;
}

.clients{
flex:1;
overflow:auto;
}

.client{
display:flex;
gap:12px;
align-items:center;
padding:14px;
border-bottom:1px solid var(--border);
cursor:pointer;
transition:.2s;
}

.client:hover{
background:#020617;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#1e293b;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
}

.phone{
font-weight:600;
font-size:14px;
}

.preview{
font-size:12px;
color:var(--muted);
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
max-width:220px;
}

/* CHAT */

.chat{
flex:1;
display:flex;
flex-direction:column;
background:var(--chat);
}

.chat-header{
padding:18px 22px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
}

.chat-title{
font-weight:700;
font-size:15px;
}

/*.actions{
display:flex;
gap:10px;
}*/


.actions{
display:none;
}



  
button{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
font-size:13px;
}

.delete{
background:var(--danger);
color:white;
}

.messages{
flex:1;
overflow:auto;
padding:28px;
display:flex;
flex-direction:column;
gap:16px;
}

/* MENSAGENS */

.msg{
max-width:60%;
padding:14px 16px;
border-radius:14px;
font-size:14px;
line-height:1.5;
position:relative;
animation:fade .2s ease;
}

.user{
background:#1e293b;
align-self:flex-start;
}

.assistant{
background:#16a34a;
align-self:flex-end;
}

.time{
font-size:11px;
margin-top:6px;
opacity:.6;
text-align:right;
letter-spacing:.3px;
}
  
.checkbox{
position:absolute;
top:-10px;
left:-28px;
}

.empty{
margin:auto;
opacity:.5;
font-size:14px;
}

@keyframes fade{
from{opacity:0;transform:translateY(6px)}
to{opacity:1}
}
.waBtn{
margin-left:12px;
display:inline-flex;
align-items:center;
justify-content:center;
background:#22c55e;
border-radius:8px;
padding:6px;
}

/* MENU 3 PONTOS */

.menuDots{
margin-left:auto;
cursor:pointer;
font-size:18px;
opacity:.6;
}

.menuDots:hover{
opacity:1;
}

.menu{
position:absolute;
background:#020617;
border:1px solid #334155;
border-radius:8px;
padding:6px;
display:none;
flex-direction:column;
z-index:1000;
}

.menu button{
background:none;
border:none;
color:white;
padding:8px 12px;
text-align:left;
cursor:pointer;
}

.menu button:hover{
background:#1e293b;
}

/* conversa pausada */

.client.pausado{
background:#3b1212;
}


.status{
font-size:11px;
margin-top:2px;
}

.status.on{
color:#22c55e;
}

.status.off{
color:#ef4444;
}


/* POPUP */

.popupOverlay{

position:fixed;
inset:0;

background:rgba(0,0,0,.75);
backdrop-filter:blur(6px);

display:none;
align-items:center;
justify-content:center;

z-index:9999;

}

.popupBox{

width:92%;
height:88%;
max-width:1200px;

background:#020617;

border-radius:16px;

border:1px solid #334155;

display:flex;
flex-direction:column;

overflow:hidden;

box-shadow:0 40px 100px rgba(0,0,0,.8);

}

.popupHeader{

display:flex;
justify-content:space-between;
align-items:center;

padding:16px 20px;

border-bottom:1px solid #334155;

}

.popupTitle{

font-weight:700;
font-size:16px;

}

.popupActions{

display:flex;
gap:10px;

}

.popupContent{

flex:1;
display:flex;

}

.popupContent iframe{

width:100%;
height:100%;

border:none;

background:#020617;

}

.btn{

border:none;
padding:9px 14px;
border-radius:8px;

cursor:pointer;

font-weight:600;
font-size:13px;

}

.blue{
background:#2563eb;
color:white;
}

.red{
background:#ef4444;
color:white;
}




  .tabBtn{
background:#020617;
border:1px solid #1e293b;
color:#e2e8f0;
padding:10px 18px;
border-radius:30px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

.tabBtn:hover{
background:#1e293b;
}

.tabBtn.active{
background:#3b82f6;
border-color:#3b82f6;
color:white;
box-shadow:0 0 10px rgba(59,130,246,0.4);
}

.sendBox{
padding:16px;
border-top:1px solid #334155;
background:#020617;
display:flex;
gap:10px;
}

.sendBox textarea{
flex:1;
resize:none;
border-radius:10px;
border:1px solid #334155;
background:#020617;
color:white;
padding:10px;
font-family:Inter;
height:60px;
}

.sendBox button{
background:#22c55e;
color:white;
border:none;
border-radius:8px;
padding:10px 16px;
cursor:pointer;
}

  

  

  
</style>
</head>

<body>

<div class="sidebar">

<div class="header">
Conversas
</div>

<div class="search">
<input id="buscar" placeholder="Buscar telefone...">
</div>

<div class="clients" id="clientes"></div>

</div>

<div class="chat">
<div class="chat-header">

<div class="chat-title" id="clienteAtual">
Selecione um cliente
</div>

<div style="display:flex;gap:10px">

<button onclick="abrirRepertorio()" style="background:#2563eb;color:white">
Controle
</button>

</div>
</div>

<div class="messages" id="mensagens">
<div class="empty">Nenhuma conversa selecionada</div>
</div>

<div class="sendBox" id="sendBox" style="display:none">

<textarea id="msgManual" placeholder="Digite a mensagem"></textarea>

<button onclick="enviarManual()">
Enviar
</button>

<button onclick="falarComAgente()" style="background:#2563eb">
Agente
</button>

</div>

</div>

<script>

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

/* realtime bot */

db
.channel("controle_bot_changes")
.on(
"postgres_changes",
{
event:"*",
schema:"public",
table:"controle_bot"
},
payload=>{
carregarClientes()
}
)
.subscribe()

let clienteSelecionado=null
let selecionadas=[]

async function carregarClientes(){

const {data} = await db
.from("conversas_whatsapp")
.select("*")
.order("created_at",{ascending:false})

const {data:memoria} = await db
.from("memoria_clientes")
.select("telefone,nome")

const nomes={}

memoria.forEach(c=>{
nomes[c.telefone]=c.nome
})

const map={}

data.forEach(m=>{
if(!map[m.telefone]) map[m.telefone]=m
})

const clientes = Object.values(map)

const container=document.getElementById("clientes")
container.innerHTML=""

for (const c of clientes){

const div=document.createElement("div")

const inicial = c.telefone.slice(-2)

const pausado = await verificarPausa(c.telefone)

div.className = pausado ? "client pausado" : "client"

div.innerHTML=`

<div class="avatar">${inicial}</div>

<div>
<div class="phone">
${nomes[c.telefone] ? nomes[c.telefone] : c.telefone}
</div>

<div class="preview">${c.mensagem}</div>
<div class="status ${pausado?'off':'on'}">
● ${pausado?'BOT PAUSADO':'BOT ATIVO'}
</div></div>

<div class="menuDots" onclick="abrirMenu(event,'${c.telefone}')">⋮</div>
<div class="menu" id="menu-${c.telefone}">

<button onclick="editarContato('${c.telefone}')">
Editar contato
</button>

<button onclick="toggleBot('${c.telefone}')" style="
background:${pausado?'#22c55e':'#ef4444'};
color:white;
padding:6px 10px;
border-radius:6px;
font-size:12px;
">
${pausado ? "ATIVAR BOT" : "DESATIVAR BOT"}
</button>

</div>
</div>

`

div.onclick=()=>abrirConversa(c.telefone)

container.appendChild(div)

}

}
async function abrirConversa(telefone){

clienteSelecionado = telefone
selecionadas = []

/* buscar nome do cliente */

const {data:cliente} = await db
.from("memoria_clientes")
.select("nome")
.eq("telefone",telefone)
.maybeSingle()

const nomeCliente = cliente?.nome || telefone

/* atualizar header */

document.getElementById("clienteAtual").innerHTML = `
${nomeCliente} • ${telefone}

<span class="menuDots" onclick="abrirMenu(event,'${telefone}')">⋮</span>
<div class="menu" id="menu-${telefone}">

<button onclick="editarContato('${telefone}')">
Editar contato
</button>

<button onclick="toggleBot('${telefone}')">
Pausar / Reativar
</button>

</div>
</div>

<a href="https://wa.me/${telefone}" target="_blank" class="waBtn">
<svg viewBox="0 0 32 32" width="18">
<path fill="#25D366" d="M16 3C9 3 3.5 8.5 3.5 15.3c0 2.4.7 4.6 2 6.6L4 29l7.3-1.9c1.9 1 4 1.5 6.2 1.5 7 0 12.5-5.5 12.5-12.3C30 8.5 23 3 16 3z"/>
</svg>
</a>
`

/* carregar mensagens */

const {data} = await db
.from("conversas_whatsapp")
.select("*")
.eq("telefone",telefone)
.order("created_at",{ascending:true})

const container = document.getElementById("mensagens")

container.innerHTML = ""

if(!data || data.length === 0){

const empty = document.createElement("div")

empty.className="empty"
empty.innerText="Nenhuma mensagem ainda"

container.appendChild(empty)

}

/* renderizar mensagens */

data.forEach(m=>{

const div = document.createElement("div")

div.className = "msg " + (m.role === "assistant" ? "assistant" : "user")

const date = new Date(m.created_at)

const dataFormatada = date.toLocaleDateString("pt-BR",{
timeZone:"America/Bahia"
})

const horaFormatada = date.toLocaleTimeString("pt-BR",{
hour:"2-digit",
minute:"2-digit",
second:"2-digit",
timeZone:"America/Bahia"
})

div.innerHTML = `
<div>${m.mensagem}</div>
<div class="time">${dataFormatada} • ${horaFormatada}</div>
`

container.appendChild(div)

})

container.scrollTo({
top:container.scrollHeight,
behavior:"smooth"
})
/* verificar se bot está pausado */

const pausado = await verificarPausa(telefone)

const sendBox = document.getElementById("sendBox")

if(pausado){

sendBox.style.display = "flex"

}else{

sendBox.style.display = "none"

}

}

async function excluirSelecionadas(){

if(selecionadas.length===0){
alert("Selecione mensagens")
return
}

if(!confirm("Excluir mensagens selecionadas?")) return

await db
.from("conversas_whatsapp")
.delete()
.in("id",selecionadas)

abrirConversa(clienteSelecionado)

}

async function excluirConversa(){

if(!clienteSelecionado) return

if(!confirm("Excluir conversa completa?")) return

await db
.from("conversas_whatsapp")
.delete()
.eq("telefone",clienteSelecionado)

document.getElementById("mensagens").innerHTML='<div class="empty">Conversa excluída</div>'

carregarClientes()

}

document.getElementById("buscar").addEventListener("input",function(){

const filtro=this.value.toLowerCase()

document.querySelectorAll(".client").forEach(c=>{

const texto=c.innerText.toLowerCase()

c.style.display=texto.includes(filtro)?"flex":"none"

})

})


carregarClientes()
function abrirRepertorio(){

const frame = document.getElementById("frameRepertorio")

if(!frame.src){
frame.src="prompt.html"
}

document.getElementById("popupRepertorio").style.display="flex"

}
function fecharRepertorio(){
document.getElementById("popupRepertorio").style.display="none"
}

function abrirIframe(url){
document.getElementById("frameRepertorio").src=url
}


/* MENU */

function abrirMenu(e,telefone){

e.stopPropagation()

document.querySelectorAll(".menu").forEach(m=>{
m.style.display="none"
})

const menu=document.getElementById("menu-"+telefone)

menu.style.display="flex"

menu.style.top=e.clientY+"px"
menu.style.left=e.clientX+"px"

}

/* FECHAR MENU */

document.addEventListener("click",()=>{
document.querySelectorAll(".menu").forEach(m=>{
m.style.display="none"
})
})

/* VERIFICAR PAUSA */

async function verificarPausa(telefone){

const {data,error} = await db
.from("controle_bot")
.select("pausado")
.eq("telefone",telefone)
.limit(1)
.maybeSingle()

if(error) return false

return data?.pausado === true

}

/* TOGGLE BOT */

async function toggleBot(telefone){

const {data,error} = await db
.from("controle_bot")
.select("pausado")
.eq("telefone",telefone)
.limit(1)
.maybeSingle()

if(error){
console.error(error)
return
}

const novoStatus = !(data?.pausado === true)

if(data){

await db
.from("controle_bot")
.update({pausado:novoStatus})
.eq("telefone",telefone)

}else{

await db
.from("controle_bot")
.insert({
telefone:telefone,
pausado:true
})

}

carregarClientes()

}


async function enviarManual(){

if(!clienteSelecionado){
alert("Selecione um cliente")
return
}

const textarea = document.getElementById("msgManual")
const msg = textarea.value.trim()

if(!msg){
alert("Digite uma mensagem")
return
}

const telefone = clienteSelecionado.replace(/\D/g,"").trim()

try {

const res = await fetch("https://nalbert.vercel.app/api/enviar-whatsapp", {
  method:"POST",
  headers:{
    "Content-Type":"application/json",
    "Authorization":"Bearer mercatto_admin_2026"
  },
  body:JSON.stringify({
    telefone,
    mensagem:msg
  })
})

const data = await res.json()

if(!res.ok){
  alert("Erro: " + JSON.stringify(data))
  return
}

/* ✅ SALVA NO BANCO (IMPORTANTE) */

await db.from("conversas_whatsapp").insert({
  telefone: telefone,
  mensagem: msg,
  role: "assistant"
})

textarea.value = ""

/* atualiza chat */
abrirConversa(telefone)

} catch (err){
alert("Erro ao enviar: " + err.message)
}

}
function falarComAgente(){

abrirIframe("agente.html")

document.getElementById("popupRepertorio").style.display="flex"

}

async function editarContato(telefone){

const {data} = await db
.from("memoria_clientes")
.select("nome")
.eq("telefone",telefone)
.maybeSingle()

const nomeAtual = data?.nome || ""

const novoNome = prompt("Editar nome do contato:",nomeAtual)

if(!novoNome) return

if(data){

await db
.from("memoria_clientes")
.update({nome:novoNome})
.eq("telefone",telefone)

}else{

await db
.from("memoria_clientes")
.insert({
telefone:telefone,
nome:novoNome
})

}

carregarClientes()

if(clienteSelecionado === telefone){
abrirConversa(telefone)
}

}








  






  

  
</script>
<div id="popupRepertorio" class="popupOverlay">

<div class="popupBox">

<div class="popupHeader">

<div class="popupTitle">
Controle
</div>

<div class="popupActions">

<button class="tabBtn active"
onclick="abrirIframe('prompt.html')">
Prompt de comando
</button>


<button class="tabBtn active"
onclick="abrirIframe('agente.html')">
Assistente
</button>

  
<button class="tabBtn"
onclick="fecharRepertorio()">
Fechar
</button>

</div>

</div>

<div class="popupContent">

<iframe id="frameRepertorio"></iframe>

</div>

</div>

</div>
</body>
</html>
