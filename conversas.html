<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Gestor de Conversas • Mercatto</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#0b1320;
--sidebar:#0f1b2d;
--chat:#0c1626;

--border:#1f2a3c;

--text:#f1f5f9;
--muted:#94a3b8;

--green:#22c55e;
--yellow:#f59e0b;
--blue:#3b82f6;
--red:#ef4444;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:340px;
background:var(--sidebar);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
}

.header{
padding:18px 20px;
font-weight:700;
font-size:18px;
border-bottom:1px solid var(--border);
}

/* SEARCH */

.search{
padding:14px;
display:flex;
flex-direction:column;
gap:10px;
border-bottom:1px solid var(--border);
}

.search input,
.search select{

background:#091322;
border:1px solid var(--border);
color:white;
padding:10px 12px;
border-radius:8px;
font-size:14px;

}

/* CLIENTS */

.clients{
flex:1;
overflow:auto;
}

.client{

display:flex;
gap:12px;
align-items:center;

padding:14px;

border-bottom:1px solid var(--border);

cursor:pointer;

transition:.2s;

}

.client:hover{
background:#091322;
}

.client.pausado{
background:#2b1212;
}

.avatar{

width:42px;
height:42px;

border-radius:50%;

background:#1f2a3c;

display:flex;
align-items:center;
justify-content:center;

font-weight:700;

}

.client-info{
flex:1;
}

.client-name{
font-weight:600;
font-size:14px;
}

.preview{

font-size:12px;
color:var(--muted);

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;

}

/* ACTION BUTTONS */

.actions{
display:flex;
gap:6px;
}

.btn{

border:none;

border-radius:8px;

padding:6px 8px;

font-size:12px;

cursor:pointer;

display:flex;
align-items:center;
justify-content:center;

transition:.2s;

}

.btn:hover{
transform:scale(1.08);
}

.pause{
background:var(--yellow);
color:white;
}

.play{
background:var(--green);
color:white;
}

.wa{
background:#25D366;
color:white;
}

/* CHAT */

.chat{

flex:1;

display:flex;

flex-direction:column;

background:var(--chat);

}

.chat-header{

padding:16px 20px;

border-bottom:1px solid var(--border);

display:flex;

justify-content:space-between;

align-items:center;

}

.chat-title{
font-weight:600;
}

/* MESSAGES */

.messages{

flex:1;

overflow:auto;

padding:30px;

display:flex;

flex-direction:column;

gap:16px;

}

/* BUBBLES */

.msg{

max-width:65%;

padding:14px 16px;

border-radius:16px;

font-size:14px;

line-height:1.4;

animation:fade .2s ease;

}

.user{

background:#1f2a3c;

align-self:flex-start;

}

.assistant{

background:#16a34a;

align-self:flex-end;

}

.time{

font-size:11px;

margin-top:6px;

opacity:.7;

text-align:right;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(8px);
}

to{
opacity:1;
transform:none;
}

}

/* BUTTON HEADER */

.header-actions{

display:flex;
gap:8px;

}

.btn-header{

border:none;

border-radius:8px;

padding:8px 12px;

font-size:13px;

cursor:pointer;

}

.btn-blue{
background:var(--blue);
color:white;
}

.btn-yellow{
background:var(--yellow);
color:white;
}

.btn-green{
background:var(--green);
color:white;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="header">
Conversas
</div>

<div class="search">

<input id="buscar" placeholder="Buscar nome ou telefone">

<select id="filtroStatus">
<option value="todos">Todos</option>
<option value="ativo">Bot ativo</option>
<option value="pausado">Bot pausado</option>
</select>

</div>

<div class="clients" id="clientes"></div>

</div>

<div class="chat">

<div class="chat-header">

<div class="chat-title" id="clienteAtual">
Selecione uma conversa
</div>

<div class="header-actions">

<button class="btn-header btn-blue" onclick="abrirRepertorio()">
Repertórios
</button>

</div>

</div>

<div class="messages" id="mensagens"></div>

</div>

<script>

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let clienteSelecionado=null

async function carregarClientes(){

const {data:conversas}=await db
.from("conversas_whatsapp")
.select("*")
.order("created_at",{ascending:false})

const {data:memoria}=await db
.from("memoria_clientes")
.select("telefone,nome")

const {data:controle}=await db
.from("controle_bot")
.select("telefone,pausado")

const nomes={}
memoria?.forEach(c=>nomes[c.telefone]=c.nome)

const pausados={}
controle?.forEach(c=>{
if(c.pausado) pausados[c.telefone]=true
})

const map={}

conversas?.forEach(m=>{
if(!map[m.telefone]) map[m.telefone]=m
})

let clientes=Object.values(map)

const busca=document.getElementById("buscar").value.toLowerCase()

if(busca){

clientes=clientes.filter(c=>{

const nome=nomes[c.telefone]||""

return nome.toLowerCase().includes(busca) ||
c.telefone.includes(busca)

})

}

const container=document.getElementById("clientes")

container.innerHTML=""

clientes.forEach(c=>{

const nome=nomes[c.telefone]||c.telefone
const inicial=nome[0].toUpperCase()

const pausado=pausados[c.telefone]

const div=document.createElement("div")

div.className="client"

if(pausado) div.classList.add("pausado")

div.innerHTML=`

<div class="avatar">${inicial}</div>

<div class="client-info">

<div class="client-name">${nome}</div>

<div class="preview">${c.mensagem}</div>

</div>

<div class="actions">

<button class="btn pause" onclick="pausarBot('${c.telefone}')">⏸</button>

<button class="btn play" onclick="despausarBot('${c.telefone}')">▶</button>

<button class="btn wa" onclick="abrirWhats('${c.telefone}')">WA</button>

</div>

`

div.onclick=()=>abrirConversa(c.telefone)

container.appendChild(div)

})

}

async function abrirConversa(telefone){

clienteSelecionado=telefone

const {data:cliente}=await db
.from("memoria_clientes")
.select("nome")
.eq("telefone",telefone)
.single()

document.getElementById("clienteAtual").innerText=
(cliente?.nome||telefone)+" • "+telefone

const {data}=await db
.from("conversas_whatsapp")
.select("*")
.eq("telefone",telefone)
.order("created_at",{ascending:true})

const container=document.getElementById("mensagens")

container.innerHTML=""

data?.forEach(m=>{

const div=document.createElement("div")

div.className="msg "+(m.role==="assistant"?"assistant":"user")

const hora=new Date(m.created_at).toLocaleString("pt-BR")

div.innerHTML=`

<div>${m.mensagem}</div>

<div class="time">${hora}</div>

`

container.appendChild(div)

})

container.scrollTop=container.scrollHeight

}

async function pausarBot(telefone){

await db.from("controle_bot").upsert({

telefone:telefone,
pausado:true

})

carregarClientes()

}

async function despausarBot(telefone){

await db.from("controle_bot").upsert({

telefone:telefone,
pausado:false

})

carregarClientes()

}

function abrirWhats(telefone){

window.open("https://wa.me/"+telefone,"_blank")

}

document.getElementById("buscar").addEventListener("input",carregarClientes)

setInterval(carregarClientes,4000)

carregarClientes()

</script>

</body>
</html>
