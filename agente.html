<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercatto • Agente Administrador</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ================= BASE ================= */

body{
margin:0;
font-family:Inter;
background:#020617;
color:#e2e8f0;
display:flex;
height:100vh;
overflow:hidden;
}

/* ================= SIDEBAR ================= */

.sidebar{
width:260px;
background:#020617;
border-right:1px solid #1e293b;
display:flex;
flex-direction:column;
}

.sidebar-header{
padding:16px;
font-weight:600;
border-bottom:1px solid #1e293b;
}

.new-chat{
margin:12px;
padding:10px;
background:#2563eb;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.conversations{
flex:1;
overflow:auto;
}

.conv{
padding:12px 16px;
border-bottom:1px solid #1e293b;
cursor:pointer;
font-size:13px;
}

/* ================= MAIN ================= */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
padding:14px 18px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
align-items:center;
}

/* CHAT */

.messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:16px;
}

/* BOLHAS */

.msg{
max-width:720px;
padding:14px;
border-radius:12px;
line-height:1.5;
font-size:14px;
}

.user{
background:#1e293b;
align-self:flex-start;
}

.assistant{
background:#16a34a;
color:white;
align-self:flex-end;
}

/* MEDIA */

.media img{
width:100%;
border-radius:10px;
margin-top:10px;
}

.media video{
width:100%;
border-radius:10px;
margin-top:10px;
}

.download{
display:inline-block;
margin-top:6px;
background:#0ea5e9;
padding:6px 10px;
border-radius:6px;
font-size:12px;
color:white;
text-decoration:none;
}

/* INPUT */

.send{
display:flex;
padding:14px;
gap:10px;
border-top:1px solid #1e293b;
}

textarea{
flex:1;
height:50px;
background:#020617;
border:1px solid #334155;
color:white;
border-radius:8px;
padding:10px;
resize:none;
}

button{
background:#2563eb;
border:none;
color:white;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

/* DASHBOARD */

.dashboard{
padding:20px;
border-top:1px solid #1e293b;
background:#020617;
}

.chart{
max-width:400px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="sidebar-header">
Mercatto AI
</div>

<button class="new-chat" onclick="novoChat()">+ Nova conversa</button>

<div class="conversations" id="conversations"></div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<div>
🤖 Agente Administrador
</div>

<div>
Dashboard
</div>

</div>

<div class="messages" id="chat"></div>

<div class="send">

<textarea id="msg" placeholder="Digite sua pergunta..."></textarea>

<input type="file" id="upload" hidden>

<button onclick="document.getElementById('upload').click()">📎</button>

<button onclick="enviar()">Enviar</button>

</div>

<div class="dashboard">

<canvas id="chartReservas" class="chart"></canvas>

</div>

</div>

<script>

/* ================= HISTÓRICO ================= */

let historico = JSON.parse(localStorage.getItem("chatHistorico") || "[]")

let conversaAtual = []

function salvarHistorico(){

localStorage.setItem("chatHistorico",JSON.stringify(historico))

renderConversas()

}

function renderConversas(){

const el = document.getElementById("conversations")

el.innerHTML=""

historico.forEach((c,i)=>{

const div = document.createElement("div")

div.className="conv"

div.innerText=c.titulo || "Conversa"

div.onclick=()=>abrirConversa(i)

el.appendChild(div)

})

}

function abrirConversa(i){

conversaAtual = historico[i].msgs

renderChat()

}

function novoChat(){

conversaAtual=[]

renderChat()

}

/* ================= RENDER CHAT ================= */

function renderChat(){

const chat = document.getElementById("chat")

chat.innerHTML=""

conversaAtual.forEach(m=>{

addMsg(m.role,m.content)

})

}

/* ================= MIDIA ================= */

function detectarMidia(texto){

const urls = texto.match(/https?:\/\/[^\s]+/g)

let html = marked.parse(texto)

if(urls){

urls.forEach(url=>{

if(url.match(/\.(jpg|jpeg|png|webp|gif)/i)){

html += `<div class="media">
<img src="${url}">
<a class="download" href="${url}" download>Baixar</a>
</div>`

}

else if(url.match(/\.(mp4|webm|mov)/i)){

html += `<div class="media">
<video controls src="${url}"></video>
<a class="download" href="${url}" download>Baixar</a>
</div>`

}

})

}

return html

}

/* ================= ADD MSG ================= */

function addMsg(role,text){

const chat = document.getElementById("chat")

const div = document.createElement("div")

div.className="msg "+role

div.innerHTML = detectarMidia(text)

chat.appendChild(div)

chat.scrollTop = chat.scrollHeight

}

/* ================= ENVIAR ================= */

async function enviar(){

const textarea = document.getElementById("msg")

const texto = textarea.value.trim()

if(!texto) return

addMsg("user",texto)

conversaAtual.push({role:"user",content:texto})

textarea.value=""

const res = await fetch("/api/admin-agente",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer mercatto_admin_2026"
},

body:JSON.stringify({
pergunta:texto
})

})

const text = await res.text()

let data

try{
data = JSON.parse(text)
}catch(e){

addMsg("assistant","Erro no servidor")

return
}

addMsg("assistant",data.resposta)

conversaAtual.push({role:"assistant",content:data.resposta})

salvarHistorico()

}

/* ENTER ENVIA */

document.getElementById("msg").addEventListener("keydown",e=>{

if(e.key==="Enter" && !e.shiftKey){

e.preventDefault()

enviar()

}

})

/* ================= UPLOAD ================= */

document.getElementById("upload").addEventListener("change",async e=>{

const file = e.target.files[0]

const reader = new FileReader()

reader.onload = function(){

addMsg("user",`Imagem enviada`)

const img = `<img src="${reader.result}">`

document.getElementById("chat").innerHTML += img

}

reader.readAsDataURL(file)

})

/* ================= DASHBOARD ================= */

const ctx = document.getElementById("chartReservas")

new Chart(ctx,{
type:"bar",
data:{
labels:["Seg","Ter","Qua","Qui","Sex","Sab","Dom"],
datasets:[{
label:"Reservas",
data:[12,19,8,15,25,30,18],
backgroundColor:"#16a34a"
}]
}
})

renderConversas()

</script>

</body>

</html>
