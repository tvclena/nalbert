<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Agente Administrador</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

:root{
--bg:#0f172a;
--sidebar:#111827;
--chat:#020617;
--card:#1e293b;
--border:#334155;
--text:#f1f5f9;
--muted:#94a3b8;
--brand:#22c55e;
--danger:#ef4444;
--glass:rgba(255,255,255,0.04);
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter;
background:linear-gradient(180deg,#0f172a,#020617);
color:var(--text);
height:100vh;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:380px;
background:var(--sidebar);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
backdrop-filter:blur(6px);
}

/* HEADER */

.header{
padding:22px;
font-weight:800;
font-size:18px;
border-bottom:1px solid var(--border);
letter-spacing:.4px;
background:linear-gradient(180deg,#111827,#020617);
}

/* SEARCH */

.search{
padding:14px;
border-bottom:1px solid var(--border);
}

.search input{
width:100%;
padding:12px 14px;
border-radius:10px;
border:none;
background:#020617;
color:white;
font-size:14px;
outline:none;
transition:.2s;
}

.search input:focus{
box-shadow:0 0 0 1px #3b82f6;
}

/* CLIENTS */

.clients{
flex:1;
overflow:auto;
}

.client{
display:flex;
gap:12px;
align-items:center;
padding:14px;
border-bottom:1px solid var(--border);
cursor:pointer;
transition:.2s;
position:relative;
}

.client:hover{
background:var(--glass);
}

/* AVATAR */

.avatar{
width:42px;
height:42px;
border-radius:50%;
background:linear-gradient(135deg,#1e293b,#0f172a);
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
font-size:13px;
border:1px solid #334155;
}

.phone{
font-weight:600;
font-size:14px;
}

.preview{
font-size:12px;
color:var(--muted);
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
max-width:220px;
}

/* CHAT */

.chat{
flex:1;
display:flex;
flex-direction:column;
background:var(--chat);
}

/* HEADER CHAT */

.chat-header{
padding:18px 22px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(180deg,#020617,#020617);
}

.chat-title{
font-weight:700;
font-size:15px;
}

/* MESSAGES */

.messages{
flex:1;
overflow:auto;
padding:30px;
display:flex;
flex-direction:column;
gap:18px;
scroll-behavior:smooth;
}

/* MSG */

.msg{
max-width:60%;
padding:14px 16px;
border-radius:14px;
font-size:14px;
line-height:1.5;
position:relative;
animation:fade .2s ease;
}

/* USER */

.user{
background:#1e293b;
align-self:flex-start;
border-bottom-left-radius:4px;
}

/* ASSISTANT */

.assistant{
background:linear-gradient(135deg,#22c55e,#16a34a);
align-self:flex-end;
border-bottom-right-radius:4px;
color:white;
}

/* TIME */

.time{
font-size:11px;
margin-top:6px;
opacity:.6;
text-align:right;
letter-spacing:.3px;
}

/* TYPING */

.typing{
padding:12px 16px;
border-radius:12px;
background:#1e293b;
width:120px;
display:flex;
gap:4px;
}

.typing span{
width:6px;
height:6px;
background:#94a3b8;
border-radius:50%;
animation:blink 1.4s infinite;
}

.typing span:nth-child(2){
animation-delay:.2s;
}

.typing span:nth-child(3){
animation-delay:.4s;
}

@keyframes blink{
0%{opacity:.2}
20%{opacity:1}
100%{opacity:.2}
}

/* SEND BOX */

.sendBox{
padding:16px;
border-top:1px solid #334155;
background:#020617;
display:flex;
gap:10px;
}

.sendBox textarea{
flex:1;
resize:none;
border-radius:10px;
border:1px solid #334155;
background:#020617;
color:white;
padding:10px;
font-family:Inter;
height:60px;
outline:none;
}

.sendBox textarea:focus{
border-color:#3b82f6;
}

.sendBox button{
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
border:none;
border-radius:8px;
padding:10px 16px;
cursor:pointer;
font-weight:600;
transition:.2s;
}

.sendBox button:hover{
transform:scale(1.05);
}

/* ANIMATION */

@keyframes fade{
from{
opacity:0;
transform:translateY(8px);
}
to{
opacity:1;
}
}

/* SCROLL */

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#334155;
border-radius:4px;
}

</style>

</head>

<body>

<div class="header">
<div class="header-title">Agente Administrador</div>
</div>

<div id="chat" class="chat"></div>

<div class="input-area">

<textarea id="msg" placeholder="Digite sua mensagem..."></textarea>

<button onclick="enviar()">Enviar</button>

</div>

<script>

/* ================= PROMPT DO SISTEMA ================= */

const SYSTEM_PROMPT = `

COLE AQUI SEU PROMPT DO AGENTE

`

/* ================= HISTORICO ================= */

let historico = JSON.parse(localStorage.getItem("mercatto_admin_chat") || "[]")

function salvarHistorico(){

localStorage.setItem("mercatto_admin_chat",JSON.stringify(historico))

}

/* ================= DETECTAR MIDIA ================= */

function renderMidia(texto){

let html = marked.parse(texto)

const urls = texto.match(/https?:\/\/[^\s]+/g)

if(urls){

urls.forEach(url=>{

if(url.match(/\.(jpg|jpeg|png|webp|gif)/i)){

html += `
<div class="media">
<img src="${url}">
<br>
<a class="download" href="${url}" download>Baixar</a>
</div>
`

}

if(url.match(/\.(mp4|webm|mov)/i)){

html += `
<div class="media">
<video controls src="${url}"></video>
<br>
<a class="download" href="${url}" download>Baixar</a>
</div>
`

}

})

}

return html

}

/* ================= ADICIONAR MSG ================= */

function addMsg(role,text){

const chat = document.getElementById("chat")

const div = document.createElement("div")

div.className="msg "+role

div.innerHTML = renderMidia(text)

chat.appendChild(div)

chat.scrollTop = chat.scrollHeight

}

/* ================= CARREGAR HISTORICO ================= */

historico.forEach(m=>{

addMsg(m.role,m.content)

})

/* ================= ENVIAR ================= */

async function enviar(){

const textarea = document.getElementById("msg")

const texto = textarea.value.trim()

if(!texto) return

addMsg("user",texto)

historico.push({role:"user",content:texto})

salvarHistorico()

textarea.value=""

/* pensando */

const chat = document.getElementById("chat")

const thinking = document.createElement("div")

thinking.className="msg assistant thinking"

thinking.innerText="Agente está pensando..."

chat.appendChild(thinking)

chat.scrollTop = chat.scrollHeight

/* requisição */

const res = await fetch("/api/admin-agente",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer mercatto_admin_2026"
},

body:JSON.stringify({
pergunta:texto,
system_prompt:SYSTEM_PROMPT
})

})

const text = await res.text()

let data

try{

data = JSON.parse(text)

}catch(e){

thinking.remove()

addMsg("assistant","Erro no servidor")

return

}

thinking.remove()

addMsg("assistant",data.resposta)

historico.push({role:"assistant",content:data.resposta})

salvarHistorico()

}

/* ENTER ENVIA */

document.getElementById("msg").addEventListener("keydown",function(e){

if(e.key==="Enter" && !e.shiftKey){

e.preventDefault()

enviar()

}

})

</script>

</body>

</html>
