<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Prompts IA • Mercatto</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>

body{
margin:0;
font-family:Inter;
background:#020617;
color:white;
padding:16px;
}

body.modal-open{
overflow:hidden;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #1e293b;
background:#020617;
color:white;
}

.lista{
display:flex;
flex-direction:column;
gap:12px;
margin-top:10px;
}

.card{
background:#0f172a;
border-radius:14px;
padding:16px;
cursor:grab;
touch-action:none;
}

.preview{
font-size:12px;
opacity:.7;
}

.btn{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.green{background:#22c55e;color:white}
.red{background:#ef4444;color:white}
.blue{background:#3b82f6;color:white}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
background:#020617;
padding:16px;
border-radius:14px;
width:100%;
max-width:650px;
max-height:90vh;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

textarea{
width:100%;
height:260px;
background:#020617;
border:1px solid #1e293b;
border-radius:10px;
padding:10px;
color:white;
}

.search-popup{
display:flex;
gap:6px;
}

.search-popup button{
width:40px;
}

</style>
</head>

<body>

<div class="header">
<h2>Prompts IA</h2>
<button class="btn green" onclick="novoPrompt()">Novo</button>
</div>

<input id="buscar" placeholder="Buscar prompt...">

<div id="lista" class="lista"></div>

<!-- MODAL -->

<div id="modal" class="modal">

<div class="modal-box">

<input id="nome" placeholder="Nome do prompt">

<div class="search-popup">

<input id="buscarPopup" placeholder="Buscar dentro do prompt">

<button class="btn blue" onclick="prevResult()">↑</button>
<button class="btn blue" onclick="nextResult()">↓</button>

</div>

<textarea id="prompt"></textarea>

<div style="display:flex;gap:10px">

<button class="btn green" onclick="salvar()">Salvar</button>
<button class="btn red" onclick="fechar()">Cancelar</button>

</div>

</div>
</div>

<script>

/* SUPABASE */

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let listaGlobal=[]
let editId=null

const lista=document.getElementById("lista")
const modal=document.getElementById("modal")

/* BUSCA INTERNA */

let resultados=[]
let indiceAtual=0

/* CARREGAR */

async function carregar(){

const {data}=await db
.from("prompts_mercatto")
.select("*")
.order("ordem",{ascending:true})

listaGlobal=data||[]

render()

}

/* RENDER */

function render(){

lista.innerHTML=""

const busca=document.getElementById("buscar").value.toLowerCase()

let filtrados=listaGlobal

if(busca){

filtrados=listaGlobal.filter(p=>
p.nome.toLowerCase().includes(busca)||
p.prompt.toLowerCase().includes(busca)
)

}

filtrados.forEach(p=>{

const card=document.createElement("div")
card.className="card"
card.dataset.id=p.id

card.innerHTML=`

<strong>${p.nome}</strong>

<div class="preview">
${p.prompt.substring(0,200)}
</div>

<div style="display:flex;gap:6px;margin-top:10px">

<button class="btn blue" onclick="editar('${p.id}')">
Editar
</button>

<button class="btn red" onclick="remover('${p.id}')">
Excluir
</button>

</div>
`

lista.appendChild(card)

})

ativarDrag()

}

/* DRAG MOBILE */

function ativarDrag(){

new Sortable(lista,{

animation:150,
delay:2000,
delayOnTouchOnly:true,
forceFallback:true,

onStart:()=>{

if(navigator.vibrate){
navigator.vibrate(80)
}

},

onEnd:salvarOrdem

})

}

/* SALVAR ORDEM */

async function salvarOrdem(){

const cards=[...document.querySelectorAll(".card")]

for(let i=0;i<cards.length;i++){

await db
.from("prompts_mercatto")
.update({ordem:i})
.eq("id",cards[i].dataset.id)

}

carregar()

}

/* NOVO */

function novoPrompt(){

editId=null
nome.value=""
prompt.value=""

abrirModal()

}

/* EDITAR */

async function editar(id){

const {data}=await db
.from("prompts_mercatto")
.select("*")
.eq("id",id)
.single()

editId=id
nome.value=data.nome
prompt.value=data.prompt

abrirModal()

}

/* SALVAR */

async function salvar(){

if(editId){

await db
.from("prompts_mercatto")
.update({
nome:nome.value,
prompt:prompt.value
})
.eq("id",editId)

}else{

await db
.from("prompts_mercatto")
.insert({
nome:nome.value,
prompt:prompt.value,
ativo:true,
ordem:listaGlobal.length
})

}

fechar()
carregar()

}

/* REMOVER */

async function remover(id){

if(!confirm("Excluir prompt?"))return

await db
.from("prompts_mercatto")
.delete()
.eq("id",id)

carregar()

}

/* MODAL */

function abrirModal(){

modal.style.display="flex"
document.body.classList.add("modal-open")

}

function fechar(){

modal.style.display="none"
document.body.classList.remove("modal-open")

}

/* BUSCA GERAL */

buscar.addEventListener("input",render)

/* BUSCA INTERNA */

buscarPopup.addEventListener("input",()=>{

const termo=buscarPopup.value.toLowerCase()
const texto=prompt.value.toLowerCase()

resultados=[]
indiceAtual=0

if(!termo) return

let pos=texto.indexOf(termo)

while(pos!==-1){

resultados.push(pos)
pos=texto.indexOf(termo,pos+1)

}

})

function irParaResultado(){

if(!resultados.length) return

const pos=resultados[indiceAtual]

prompt.focus()
prompt.setSelectionRange(pos,pos+buscarPopup.value.length)

}

function nextResult(){

if(!resultados.length) return

indiceAtual++

if(indiceAtual>=resultados.length)
indiceAtual=0

irParaResultado()

}

function prevResult(){

if(!resultados.length) return

indiceAtual--

if(indiceAtual<0)
indiceAtual=resultados.length-1

irParaResultado()

}

carregar()

</script>

</body>
</html>
