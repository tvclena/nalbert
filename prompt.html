<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<title>CMS Prompts IA • Mercatto</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>

:root{
--bg:#020617;
--card:#0f172a;
--border:#1e293b;
--text:#f1f5f9;
--muted:#94a3b8;
--green:#22c55e;
--red:#ef4444;
--blue:#3b82f6;
--radius:16px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:#020617;
color:var(--text);
padding:16px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:20px;
font-weight:800;
}

.btn{
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.green{background:var(--green);color:white}
.red{background:var(--red);color:white}
.blue{background:var(--blue);color:white}

/* LISTA */

.lista{
display:flex;
flex-direction:column;
gap:12px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
padding:14px;
cursor:grab;
}

.nome{
font-weight:700;
margin-bottom:6px;
}

.preview{
font-size:12px;
color:var(--muted);
white-space:pre-wrap;
max-height:120px;
overflow:hidden;
}

.acoes{
display:flex;
gap:8px;
margin-top:10px;
}

.acoes button{
flex:1;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
padding:16px;
}

.modal-box{
background:#020617;
border:1px solid var(--border);
border-radius:16px;
padding:16px;
width:100%;
max-width:520px;
display:flex;
flex-direction:column;
gap:10px;
max-height:90vh;
}

input,textarea{
width:100%;
background:#020617;
border:1px solid var(--border);
border-radius:10px;
padding:10px;
color:white;
font-family:Inter;
}

textarea{
height:240px;
resize:none;
}

.counter{
font-size:12px;
color:var(--muted);
display:flex;
justify-content:space-between;
}

.empty{
text-align:center;
margin-top:60px;
opacity:.6;
}

</style>
</head>

<body>

<div class="header">

<div class="title">
Prompts IA
</div>

<button class="btn green" onclick="novoPrompt()">
Novo Prompt
</button>

</div>

<div id="lista" class="lista"></div>

<div id="empty" class="empty" style="display:none">
Nenhum prompt cadastrado
</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<input id="nome" placeholder="Nome do prompt">

<textarea id="prompt"></textarea>

<div class="counter">

<span id="chars">0 caracteres</span>

<span id="tokens">0 tokens</span>

</div>

<div style="display:flex;gap:10px">

<button class="btn green" onclick="salvar()">
Salvar
</button>

<button class="btn red" onclick="fechar()">
Cancelar
</button>

</div>

</div>

</div>

<script>

/* SUPABASE */

const db = window.supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let editId=null
let listaGlobal=[]

/* TOKEN ESTIMATE */

function contarTokens(texto){

if(!texto) return 0

return Math.ceil(texto.length / 4)

}

/* CONTADORES */

document.getElementById("prompt").addEventListener("input",()=>{

const txt=document.getElementById("prompt").value

document.getElementById("chars").innerText =
txt.length+" caracteres"

document.getElementById("tokens").innerText =
contarTokens(txt)+" tokens"

})

/* CARREGAR */

async function carregar(){

const {data,error} = await db
.from("prompts_mercatto")
.select("*")
.order("ordem",{ascending:true})

if(error){

console.error(error)
alert("Erro ao carregar prompts")
return

}

listaGlobal=data

render()

}

/* RENDER */

function render(){

const lista=document.getElementById("lista")

lista.innerHTML=""

if(!listaGlobal || listaGlobal.length===0){

document.getElementById("empty").style.display="block"
return

}

document.getElementById("empty").style.display="none"

listaGlobal.forEach(p=>{

const div=document.createElement("div")
div.className="card"
div.dataset.id=p.id

div.innerHTML=`

<div class="nome">${p.nome}</div>

<div class="preview">

${(p.prompt||"").substring(0,400)}

</div>

<div class="acoes">

<button class="btn blue" onclick="editar('${p.id}')">
Editar
</button>

<button class="btn green" onclick="toggle('${p.id}',${p.ativo})">
${p.ativo?"Ativo":"Inativo"}
</button>

<button class="btn red" onclick="remover('${p.id}')">
Excluir
</button>

</div>

`

lista.appendChild(div)

})

sortable()

}

/* DRAG ORDER */

function sortable(){

new Sortable(lista,{
animation:150,
onEnd:salvarOrdem
})

}

/* SALVAR ORDEM */

async function salvarOrdem(){

const cards=[...document.querySelectorAll(".card")]

for(let i=0;i<cards.length;i++){

const id=cards[i].dataset.id

await db
.from("prompts_mercatto")
.update({ordem:i})
.eq("id",id)

}

carregar()

}

/* NOVO */

function novoPrompt(){

editId=null

document.getElementById("nome").value=""
document.getElementById("prompt").value=""

document.getElementById("chars").innerText="0 caracteres"
document.getElementById("tokens").innerText="0 tokens"

modal.style.display="flex"

}

/* EDITAR */

async function editar(id){

const {data} = await db
.from("prompts_mercatto")
.select("*")
.eq("id",id)
.single()

editId=id

nome.value=data.nome
prompt.value=data.prompt

document.getElementById("chars").innerText =
data.prompt.length+" caracteres"

document.getElementById("tokens").innerText =
contarTokens(data.prompt)+" tokens"

modal.style.display="flex"

}

/* SALVAR */

async function salvar(){

const nome=document.getElementById("nome").value.trim()
const prompt=document.getElementById("prompt").value.trim()

if(!nome || !prompt){

alert("Preencha todos os campos")
return

}

if(editId){

await db
.from("prompts_mercatto")
.update({nome,prompt})
.eq("id",editId)

}else{

await db
.from("prompts_mercatto")
.insert({
nome,
prompt,
ativo:true,
ordem:listaGlobal.length
})

}

fechar()
carregar()

}

/* REMOVER */

async function remover(id){

if(!confirm("Excluir prompt?")) return

await db
.from("prompts_mercatto")
.delete()
.eq("id",id)

carregar()

}

/* ATIVAR */

async function toggle(id,ativo){

await db
.from("prompts_mercatto")
.update({ativo:!ativo})
.eq("id",id)

carregar()

}

/* FECHAR */

function fechar(){

modal.style.display="none"

}

/* INIT */

carregar()

</script>

</body>
</html>
