<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>CMS Prompts IA • Mercatto</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>

:root{
--bg:#020617;
--card:#0f172a;
--border:#1e293b;
--text:#f1f5f9;
--muted:#94a3b8;
--green:#22c55e;
--red:#ef4444;
--blue:#3b82f6;
--yellow:#fde047;
--radius:16px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
padding:16px;
}

body.modal-open{
overflow:hidden;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.title{
font-size:20px;
font-weight:800;
}

/* SEARCH */

.search{
margin-bottom:16px;
}

.search input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
background:#020617;
color:white;
font-size:14px;
}

/* BUTTON */

.btn{
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.green{background:var(--green);color:white}
.red{background:var(--red);color:white}
.blue{background:var(--blue);color:white}

/* LIST */

.lista{
display:flex;
flex-direction:column;
gap:12px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
padding:16px;
cursor:grab;
touch-action:none;
}

.nome{
font-weight:700;
font-size:15px;
margin-bottom:6px;
}

.preview{
font-size:12px;
color:var(--muted);
white-space:pre-wrap;
max-height:120px;
overflow:hidden;
}

.acoes{
display:flex;
gap:8px;
margin-top:12px;
}

.acoes button{
flex:1;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
align-items:center;
justify-content:center;
padding:16px;
z-index:999;
}

.modal-box{
background:#020617;
border:1px solid var(--border);
border-radius:16px;
padding:16px;
width:100%;
max-width:650px;
display:flex;
flex-direction:column;
gap:10px;
max-height:90vh;
overflow:auto;
}

/* INPUT */

input,textarea{
width:100%;
background:#020617;
border:1px solid var(--border);
border-radius:10px;
padding:10px;
color:white;
font-family:Inter;
}

textarea{
height:260px;
resize:none;
}

/* BUSCA POPUP */

.popup-search{
display:flex;
gap:6px;
}

.popup-search input{
flex:1;
}

.popup-search button{
width:40px;
}

.highlight{
background:var(--yellow);
color:black;
}

/* EMPTY */

.empty{
text-align:center;
margin-top:60px;
opacity:.6;
}

</style>
</head>

<body>

<div class="header">
<div class="title">Prompts IA</div>

<button class="btn green" onclick="novoPrompt()">
Novo Prompt
</button>
</div>

<div class="search">
<input id="buscar" placeholder="Buscar prompt...">
</div>

<div id="lista" class="lista"></div>

<div id="empty" class="empty" style="display:none">
Nenhum prompt encontrado
</div>

<!-- MODAL -->

<div id="modal" class="modal">

<div class="modal-box">

<input id="nome" placeholder="Nome do prompt">

<div class="popup-search">

<input id="buscarPopup" placeholder="Buscar dentro do prompt">

<button class="btn blue" onclick="prevResult()">↑</button>
<button class="btn blue" onclick="nextResult()">↓</button>

</div>

<textarea id="prompt"></textarea>

<div style="display:flex;gap:10px">

<button class="btn green" onclick="salvar()">Salvar</button>

<button class="btn red" onclick="fechar()">Cancelar</button>

</div>

</div>

</div>

<script>

/* SUPABASE */

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

/* VARS */

let editId=null
let listaGlobal=[]

const lista=document.getElementById("lista")
const modal=document.getElementById("modal")
const nome=document.getElementById("nome")
const prompt=document.getElementById("prompt")
const buscar=document.getElementById("buscar")
const buscarPopup=document.getElementById("buscarPopup")

let resultados=[]
let indice=0

/* CARREGAR */

async function carregar(){

const {data,error}=await db
.from("prompts_mercatto")
.select("*")
.order("ordem",{ascending:true})

if(error){
console.error(error)
alert("Erro ao carregar prompts")
return
}

listaGlobal=data||[]
render()

}

/* RENDER */

function render(){

lista.innerHTML=""

let filtrados=listaGlobal

const busca=buscar.value.toLowerCase()

if(busca){

filtrados=listaGlobal.filter(p=>
(p.nome||"").toLowerCase().includes(busca) ||
(p.prompt||"").toLowerCase().includes(busca)
)

}

if(filtrados.length===0){
document.getElementById("empty").style.display="block"
return
}

document.getElementById("empty").style.display="none"

filtrados.forEach(p=>{

const card=document.createElement("div")
card.className="card"
card.dataset.id=p.id

card.innerHTML=`

<div class="nome">${p.nome}</div>

<div class="preview">${(p.prompt||"").substring(0,350)}</div>

<div class="acoes">

<button class="btn blue" onclick="editar('${p.id}')">
Editar
</button>

<button class="btn green" onclick="toggle('${p.id}',${p.ativo})">
${p.ativo?"Ativo":"Inativo"}
</button>

<button class="btn red" onclick="remover('${p.id}')">
Excluir
</button>

</div>

`

lista.appendChild(card)

})

ativarDrag()

}

/* DRAG MOBILE */

function ativarDrag(){

new Sortable(lista,{
animation:150,
delay:2000,
delayOnTouchOnly:true,
touchStartThreshold:4,
forceFallback:true,
fallbackTolerance:5,

onStart:()=>{
if(navigator.vibrate) navigator.vibrate(80)
},

onEnd:salvarOrdem
})

}

/* SALVAR ORDEM */

async function salvarOrdem(){

const cards=[...document.querySelectorAll(".card")]

for(let i=0;i<cards.length;i++){

const id=cards[i].dataset.id

await db
.from("prompts_mercatto")
.update({ordem:i})
.eq("id",id)

}

carregar()

}

/* BUSCA LISTA */

buscar.addEventListener("input",render)

/* NOVO */

function novoPrompt(){

editId=null
nome.value=""
prompt.value=""

abrirModal()

}

/* EDITAR */

async function editar(id){

const {data}=await db
.from("prompts_mercatto")
.select("*")
.eq("id",id)
.single()

editId=id
nome.value=data.nome
prompt.value=data.prompt

abrirModal()

}

/* SALVAR */

async function salvar(){

const n=nome.value.trim()
const p=prompt.value.trim()

if(!n||!p){
alert("Preencha todos os campos")
return
}

if(editId){

await db
.from("prompts_mercatto")
.update({nome:n,prompt:p})
.eq("id",editId)

}else{

await db
.from("prompts_mercatto")
.insert({
nome:n,
prompt:p,
ativo:true,
ordem:listaGlobal.length
})

}

fechar()
carregar()

}

/* REMOVER */

async function remover(id){

if(!confirm("Excluir prompt?"))return

await db
.from("prompts_mercatto")
.delete()
.eq("id",id)

carregar()

}

/* TOGGLE */

async function toggle(id,ativo){

await db
.from("prompts_mercatto")
.update({ativo:!ativo})
.eq("id",id)

carregar()

}

/* MODAL */

function abrirModal(){
modal.style.display="flex"
document.body.classList.add("modal-open")
}

function fechar(){
modal.style.display="none"
document.body.classList.remove("modal-open")
}

/* BUSCA DENTRO DO PROMPT */

buscarPopup.addEventListener("input",buscarInterno)

function buscarInterno(){

const termo=buscarPopup.value.toLowerCase()
const texto=prompt.value.toLowerCase()

resultados=[]
indice=0

let pos=texto.indexOf(termo)

while(pos!==-1){

resultados.push(pos)
pos=texto.indexOf(termo,pos+1)

}

if(resultados.length) irParaResultado()

}

function irParaResultado(){

const pos=resultados[indice]

prompt.focus()
prompt.setSelectionRange(pos,pos+buscarPopup.value.length)

}

function nextResult(){

if(!resultados.length) return

indice++
if(indice>=resultados.length) indice=0

irParaResultado()

}

function prevResult(){

if(!resultados.length) return

indice--
if(indice<0) indice=resultados.length-1

irParaResultado()

}

/* INIT */

carregar()

</script>

</body>
</html>
