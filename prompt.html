<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Mercatto • Gerenciador de Prompts IA</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>

:root{
--bg:#020617;
--card:#0f172a;
--border:#1e293b;
--text:#f8fafc;
--muted:#94a3b8;
--green:#22c55e;
--red:#ef4444;
--blue:#3b82f6;
--yellow:#f59e0b;
--radius:14px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
padding:18px;
}

body.modal-open{
overflow:hidden;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.header h1{
font-size:20px;
margin:0;
}

/* BUSCA */

.search{
margin-bottom:14px;
}

.search input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
background:var(--card);
color:white;
}

/* BOTÕES */

.btn{
border:none;
padding:10px 14px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.green{background:var(--green);color:white}
.red{background:var(--red);color:white}
.blue{background:var(--blue);color:white}
.yellow{background:var(--yellow);color:black}

/* LISTA */

.lista{
display:flex;
flex-direction:column;
gap:12px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
padding:16px;
cursor:grab;
touch-action:none;
}

.card h3{
margin:0;
font-size:16px;
}

.preview{
font-size:13px;
color:var(--muted);
margin-top:6px;
white-space:pre-wrap;
max-height:120px;
overflow:hidden;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:10px;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
background:var(--card);
border-radius:var(--radius);
padding:18px;
width:100%;
max-width:650px;
max-height:90vh;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

textarea{
width:100%;
height:260px;
background:var(--bg);
border:1px solid var(--border);
border-radius:10px;
padding:10px;
color:white;
resize:none;
}

input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid var(--border);
background:var(--bg);
color:white;
}

/* BUSCA INTERNA */

.popup-search{
display:flex;
gap:6px;
}

.popup-search button{
width:40px;
}

/* CONTADORES */

.info{
font-size:12px;
color:var(--muted);
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<div class="header">

<h1>Prompts IA</h1>

<button class="btn green" onclick="novoPrompt()">
Novo Prompt
</button>

</div>

<div class="search">
<input id="buscar" placeholder="Buscar prompts...">
</div>

<div id="lista" class="lista"></div>

<!-- MODAL -->

<div id="modal" class="modal">

<div class="modal-box">

<input id="nome" placeholder="Nome do prompt">

<div class="popup-search">

<input id="buscarPopup" placeholder="Buscar no texto">

<button class="btn blue" onclick="prevResult()">↑</button>
<button class="btn blue" onclick="nextResult()">↓</button>

</div>

<textarea id="prompt"></textarea>

<div class="info">
<div id="charCount">0 caracteres</div>
<div id="wordCount">0 palavras</div>
</div>

<div style="display:flex;gap:8px;flex-wrap:wrap">

<button class="btn green" onclick="salvar()">Salvar</button>
<button class="btn blue" onclick="copiarPrompt()">Copiar</button>
<button class="btn yellow" onclick="duplicarPrompt()">Duplicar</button>
<button class="btn red" onclick="fechar()">Fechar</button>

</div>

</div>
</div>

<script>

/* SUPABASE */

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let listaGlobal=[]
let editId=null

const lista=document.getElementById("lista")
const modal=document.getElementById("modal")

/* BUSCA INTERNA */

let resultados=[]
let indiceAtual=0

/* CONTADORES */

prompt.addEventListener("input",()=>{

charCount.innerText = prompt.value.length + " caracteres"

wordCount.innerText =
prompt.value.trim().split(/\s+/).length + " palavras"

})

/* CARREGAR */

async function carregar(){

const {data}=await db
.from("prompts_mercatto")
.select("*")
.order("ordem",{ascending:true})

listaGlobal=data||[]

render()

}

/* RENDER */

function render(){

lista.innerHTML=""

const busca=buscar.value.toLowerCase()

let filtrados=listaGlobal

if(busca){

filtrados=listaGlobal.filter(p=>
p.nome.toLowerCase().includes(busca) ||
p.prompt.toLowerCase().includes(busca)
)

}

filtrados.forEach(p=>{

const card=document.createElement("div")
card.className="card"
card.dataset.id=p.id

card.innerHTML=`

<h3>${p.nome}</h3>

<div class="preview">
${p.prompt.substring(0,220)}
</div>

<div class="actions">

<button class="btn blue" onclick="editar('${p.id}')">
Editar
</button>

<button class="btn green" onclick="toggle('${p.id}',${p.ativo})">
${p.ativo?"Ativo":"Inativo"}
</button>

<button class="btn yellow" onclick="duplicar('${p.id}')">
Duplicar
</button>

<button class="btn red" onclick="remover('${p.id}')">
Excluir
</button>

<button class="btn blue" onclick="copiar('${p.prompt.replace(/'/g,"&#39;")}')">
Copiar
</button>

</div>
`

lista.appendChild(card)

})

ativarDrag()

}

/* DRAG */

function ativarDrag(){

new Sortable(lista,{

animation:150,
delay:2000,
delayOnTouchOnly:true,
forceFallback:true,

onStart:()=>{
if(navigator.vibrate) navigator.vibrate(80)
},

onEnd:salvarOrdem

})

}

/* SALVAR ORDEM */

async function salvarOrdem(){

const cards=[...document.querySelectorAll(".card")]

for(let i=0;i<cards.length;i++){

await db
.from("prompts_mercatto")
.update({ordem:i})
.eq("id",cards[i].dataset.id)

}

carregar()

}

/* NOVO */

function novoPrompt(){

editId=null
nome.value=""
prompt.value=""

abrirModal()

}

/* EDITAR */

async function editar(id){

const {data}=await db
.from("prompts_mercatto")
.select("*")
.eq("id",id)
.single()

editId=id
nome.value=data.nome
prompt.value=data.prompt

abrirModal()

}

/* SALVAR */

async function salvar(){

if(editId){

await db
.from("prompts_mercatto")
.update({
nome:nome.value,
prompt:prompt.value
})
.eq("id",editId)

}else{

await db
.from("prompts_mercatto")
.insert({
nome:nome.value,
prompt:prompt.value,
ativo:true,
ordem:listaGlobal.length
})

}

fechar()
carregar()

}

/* DUPLICAR */

async function duplicar(id){

const p=listaGlobal.find(x=>x.id==id)

await db
.from("prompts_mercatto")
.insert({
nome:p.nome+" (cópia)",
prompt:p.prompt,
ativo:true,
ordem:listaGlobal.length
})

carregar()

}

/* TOGGLE */

async function toggle(id,ativo){

await db
.from("prompts_mercatto")
.update({ativo:!ativo})
.eq("id",id)

carregar()

}

/* REMOVER */

async function remover(id){

if(!confirm("Excluir prompt?")) return

await db
.from("prompts_mercatto")
.delete()
.eq("id",id)

carregar()

}

/* COPIAR */

function copiar(texto){

navigator.clipboard.writeText(texto)

alert("Prompt copiado")

}

function copiarPrompt(){

navigator.clipboard.writeText(prompt.value)

}

/* MODAL */

function abrirModal(){

modal.style.display="flex"
document.body.classList.add("modal-open")

}

function fechar(){

modal.style.display="none"
document.body.classList.remove("modal-open")

}

/* BUSCA */

buscar.addEventListener("input",render)

/* BUSCA INTERNA */

buscarPopup.addEventListener("input",()=>{

const termo=buscarPopup.value.toLowerCase()
const texto=prompt.value.toLowerCase()

resultados=[]
indiceAtual=0

if(!termo) return

let pos=texto.indexOf(termo)

while(pos!==-1){

resultados.push(pos)
pos=texto.indexOf(termo,pos+1)

}

})

function irParaResultado(){

if(!resultados.length) return

const pos=resultados[indiceAtual]

prompt.focus()
prompt.setSelectionRange(pos,pos+buscarPopup.value.length)

}

function nextResult(){

if(!resultados.length) return

indiceAtual++

if(indiceAtual>=resultados.length)
indiceAtual=0

irParaResultado()

}

function prevResult(){

if(!resultados.length) return

indiceAtual--

if(indiceAtual<0)
indiceAtual=resultados.length-1

irParaResultado()

}

/* INIT */

carregar()

</script>

</body>
</html>
