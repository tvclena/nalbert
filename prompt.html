<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<title>Prompts IA • Mercatto</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#020617;
--card:#0f172a;
--border:#1e293b;
--text:#f1f5f9;
--muted:#94a3b8;
--green:#22c55e;
--red:#ef4444;
--blue:#3b82f6;
--radius:16px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:linear-gradient(180deg,#020617,#020617);
color:var(--text);
padding:16px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:20px;
font-weight:800;
}

.btn{
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.green{background:var(--green);color:white}
.red{background:var(--red);color:white}
.blue{background:var(--blue);color:white}

/* LISTA */

.lista{
display:flex;
flex-direction:column;
gap:12px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
padding:14px;
}

.nome{
font-weight:700;
margin-bottom:6px;
}

.preview{
font-size:12px;
color:var(--muted);
white-space:pre-wrap;
max-height:100px;
overflow:hidden;
}

.acoes{
display:flex;
gap:8px;
margin-top:10px;
}

.acoes button{
flex:1;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
padding:16px;
}

.modal-box{
background:#020617;
border:1px solid var(--border);
border-radius:16px;
padding:16px;
width:100%;
max-width:520px;
display:flex;
flex-direction:column;
gap:10px;
max-height:90vh;
}

input,textarea{
width:100%;
background:#020617;
border:1px solid var(--border);
border-radius:10px;
padding:10px;
color:white;
font-family:Inter;
}

textarea{
height:220px;
resize:none;
}

.counter{
font-size:11px;
color:var(--muted);
text-align:right;
}

.empty{
text-align:center;
margin-top:60px;
opacity:.6;
}

</style>
</head>

<body>

<div class="header">

<div class="title">
Prompts IA
</div>

<button class="btn green" onclick="novoPrompt()">
Novo Prompt
</button>

</div>

<div class="lista" id="lista"></div>

<div id="empty" class="empty" style="display:none">
Nenhum prompt cadastrado
</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<input id="nome" placeholder="Nome do prompt">

<textarea id="prompt"></textarea>

<div id="counter" class="counter">
0 caracteres
</div>

<div style="display:flex;gap:10px">

<button class="btn green" onclick="salvar()">
Salvar
</button>

<button class="btn red" onclick="fechar()">
Cancelar
</button>

</div>

</div>

</div>

<script>

/* ===== SUPABASE ===== */

const db = window.supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let editId=null

/* ===== CARREGAR PROMPTS ===== */

async function carregar(){

const {data,error} = await db
.from("prompts_mercatto")
.select("*")
.order("ordem",{ascending:true})

if(error){

console.error(error)
alert("Erro ao carregar prompts")

return

}

const lista=document.getElementById("lista")
lista.innerHTML=""

if(!data || data.length===0){

document.getElementById("empty").style.display="block"
return

}

document.getElementById("empty").style.display="none"

data.forEach(p=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="nome">${p.nome}</div>

<div class="preview">
${(p.prompt||"").substring(0,300)}
</div>

<div class="acoes">

<button class="btn blue" onclick="editar('${p.id}')">
Editar
</button>

<button class="btn green" onclick="toggle('${p.id}',${p.ativo})">
${p.ativo?"Ativo":"Inativo"}
</button>

<button class="btn red" onclick="remover('${p.id}')">
Excluir
</button>

</div>

`

lista.appendChild(card)

})

}

/* ===== NOVO ===== */

function novoPrompt(){

editId=null

document.getElementById("nome").value=""
document.getElementById("prompt").value=""
document.getElementById("counter").innerText="0 caracteres"

document.getElementById("modal").style.display="flex"

}

/* ===== EDITAR ===== */

async function editar(id){

const {data,error} = await db
.from("prompts_mercatto")
.select("*")
.eq("id",id)
.single()

if(error){

alert("Erro ao carregar prompt")
return

}

editId=id

document.getElementById("nome").value=data.nome
document.getElementById("prompt").value=data.prompt

contar()

document.getElementById("modal").style.display="flex"

}

/* ===== SALVAR ===== */

async function salvar(){

const nome=document.getElementById("nome").value.trim()
const prompt=document.getElementById("prompt").value.trim()

if(!nome || !prompt){

alert("Preencha todos os campos")
return

}

if(editId){

await db
.from("prompts_mercatto")
.update({nome,prompt})
.eq("id",editId)

}else{

await db
.from("prompts_mercatto")
.insert({
nome,
prompt,
ativo:true,
ordem:1
})

}

fechar()
carregar()

}

/* ===== REMOVER ===== */

async function remover(id){

if(!confirm("Excluir prompt?")) return

await db
.from("prompts_mercatto")
.delete()
.eq("id",id)

carregar()

}

/* ===== ATIVAR ===== */

async function toggle(id,ativo){

await db
.from("prompts_mercatto")
.update({ativo:!ativo})
.eq("id",id)

carregar()

}

/* ===== FECHAR MODAL ===== */

function fechar(){

document.getElementById("modal").style.display="none"

}

/* ===== CONTADOR ===== */

document.getElementById("prompt").addEventListener("input",contar)

function contar(){

const txt=document.getElementById("prompt").value

document.getElementById("counter").innerText =
txt.length + " caracteres"

}

/* ===== INIT ===== */

carregar()

</script>

</body>
</html>
