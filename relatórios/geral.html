<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<title>Central de Relatórios</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
--primary:#14b8a6;
--primary-dark:#0f766e;
--bg:#0b1220;
--panel:#0f172a;
--text:#e5e7eb;
--muted:#94a3b8;
--border:rgba(148,163,184,.18);
}

body{
margin:0;
font-family:Inter;
background:
radial-gradient(1200px 600px at 10% -10%, rgba(20,184,166,.08), transparent 60%),
radial-gradient(900px 500px at 110% 10%, rgba(20,184,166,.06), transparent 55%),
var(--bg);
color:var(--text);
}

/* HEADER */

.header{
max-width:1200px;
margin:auto;
padding:30px 20px 10px;
}

.header h1{
margin:0;
font-size:28px;
font-weight:900;
}

.header p{
margin:6px 0 0;
color:var(--muted);
font-size:13px;
}

/* SEARCH */

.search{
max-width:1200px;
margin:auto;
padding:10px 20px;
}

.search input{

width:100%;

padding:12px 16px;

border-radius:999px;

border:1px solid var(--border);

background:#020617;

color:#fff;

outline:none;

text-transform:uppercase;

}

/* GRID */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:16px;

}

.card{

background:

linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
var(--panel);

border-radius:14px;

border:1px solid var(--border);

padding:14px;

cursor:pointer;

transition:.2s;

}

.card:hover{

transform:translateY(-3px);

border-color:rgba(20,184,166,.5);

}

.icon{

width:36px;
height:36px;

display:flex;
align-items:center;
justify-content:center;

border-radius:10px;

background:linear-gradient(135deg,var(--primary),var(--primary-dark));

}

/* IFRAME */

.viewer{

max-width:1200px;
margin:20px auto;
padding:0 20px;

}

iframe{

width:100%;
height:600px;

border:none;

border-radius:14px;

background:#020617;

}

</style>
</head>

<body>

<div class="header">

<h1>📊 Central de Relatórios</h1>

<p>Delivery • CMV • Vendas • Ingredientes</p>

</div>

<div class="search">

<input id="busca" placeholder="Pesquisar relatório...">

</div>

<div class="container">

<div class="grid" id="grid">

<div class="card" onclick="abrir('delivery.html')">
<div class="icon">🚚</div>
<h3>Delivery</h3>
</div>

<div class="card" onclick="abrir('vendas.html')">
<div class="icon">🛒</div>
<h3>Vendas</h3>
</div>

<div class="card" onclick="abrir('ingredientes.html')">
<div class="icon">🧾</div>
<h3>Ingredientes</h3>
</div>

<div class="card" onclick="abrir('cmv.html')">
<div class="icon">📊</div>
<h3>CMV</h3>
</div>

</div>

</div>

<div class="viewer">

<iframe id="frame"></iframe>

</div>

<script>

/* ABRIR RELATÓRIO */

function abrir(pagina){

document.getElementById("frame").src = pagina

}

/* PESQUISA */

const busca = document.getElementById("busca")

busca.addEventListener("input",()=>{

const termo = busca.value.toLowerCase()

document.querySelectorAll(".card").forEach(card=>{

const texto = card.innerText.toLowerCase()

card.style.display = texto.includes(termo) ? "block" : "none"

})

})

</script>

</body>
</html>
