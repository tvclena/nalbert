<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Central de Relatórios</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* BASE */

body{
margin:0;
font-family:Inter;
background:linear-gradient(90deg,#021024,#01142b);
color:#e2e8f0;
}

/* CONTAINER CENTRAL */

.wrapper{
max-width:1150px;
margin:auto;
padding:50px 20px;
}

/* TITULO */

h1{
text-align:center;
font-weight:800;
margin-bottom:30px;
}

/* BARRA DE PESQUISA */

.search{
margin-bottom:30px;
}

.search input{
width:100%;
padding:12px 18px;
background:#020b1a;
border:1px solid #1f3b63;
border-radius:30px;
color:white;
}

/* CARDS RELATORIOS */

.relatorios{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
margin-bottom:40px;
}

.relatorioCard{

background:linear-gradient(180deg,#0c1e38,#08172c);
border:1px solid #1f3b63;
border-radius:14px;
padding:14px;
cursor:pointer;
transition:.2s;

display:flex;
align-items:center;
gap:10px;
}

.relatorioCard:hover{
transform:translateY(-3px);
border-color:#3b82f6;
}

.icon{
width:32px;
height:32px;
background:#22c55e;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
}

/* KPIs */

.kpis{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:14px;
margin-bottom:24px;
}

.card{
background:linear-gradient(180deg,#0c1e38,#08172c);
border:1px solid #1f3b63;
border-radius:14px;
padding:16px;
}

.card h3{
margin:0;
font-size:12px;
color:#9db7d9;
}

.kpi{
font-size:24px;
font-weight:800;
margin-top:6px;
}

/* GRÁFICOS */

.gridCharts{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.gridCharts2{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
}

canvas{
width:100%!important;
height:260px!important;
}

/* RESPONSIVO */

@media(max-width:900px){

.relatorios{
grid-template-columns:repeat(2,1fr);
}

.kpis{
grid-template-columns:repeat(2,1fr);
}

.gridCharts{
grid-template-columns:1fr;
}

.gridCharts2{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="wrapper">

<h1>📊 Central de Relatórios</h1>

<div class="search">
<input id="busca" placeholder="Pesquisar relatório...">
</div>


<!-- CARDS RELATÓRIOS -->

<div class="relatorios">

<div class="relatorioCard" onclick="carregarDelivery()">
<div class="icon">🚚</div>
Delivery
</div>

<div class="relatorioCard" onclick="carregarVendas()">
<div class="icon">🛒</div>
Vendas
</div>

<div class="relatorioCard" onclick="carregarIngredientes()">
<div class="icon">📄</div>
Ingredientes
</div>

<div class="relatorioCard" onclick="carregarCMV()">
<div class="icon">📊</div>
CMV
</div>

</div>


<div id="conteudoRelatorio"></div>

</div>


<script>

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let charts={}

function money(v){
return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})
}

function destroyCharts(){
Object.values(charts).forEach(c=>c.destroy())
charts={}
}

/* TEMPLATE DELIVERY */

function templateDelivery(){

return `

<div class="kpis">

<div class="card">
<h3>Total pedidos</h3>
<div id="pedidosTotal" class="kpi">0</div>
</div>

<div class="card">
<h3>Pedidos entregues</h3>
<div id="pedidosEntregues" class="kpi">0</div>
</div>

<div class="card">
<h3>Pedidos cancelados</h3>
<div id="pedidosCancelados" class="kpi">0</div>
</div>

<div class="card">
<h3>Ticket médio</h3>
<div id="ticketDelivery" class="kpi">R$0</div>
</div>

<div class="card">
<h3>Faturamento</h3>
<div id="faturamentoDelivery" class="kpi">R$0</div>
</div>

<div class="card">
<h3>Clientes únicos</h3>
<div id="clientesDelivery" class="kpi">0</div>
</div>

</div>

<div class="gridCharts">

<div class="card">
<h3>Pedidos por hora</h3>
<canvas id="graficoHoraDelivery"></canvas>
</div>

<div class="card">
<h3>Status pedidos</h3>
<canvas id="graficoStatusDelivery"></canvas>
</div>

</div>

<div class="gridCharts2">

<div class="card">
<h3>Pedidos por dia</h3>
<canvas id="graficoDiaDelivery"></canvas>
</div>

<div class="card">
<h3>Top produtos</h3>
<canvas id="graficoProdutosDelivery"></canvas>
</div>

<div class="card">
<h3>Top clientes</h3>
<canvas id="graficoClientesDelivery"></canvas>
</div>

</div>

`

}

async function carregarDelivery(){

destroyCharts()

document.getElementById("conteudoRelatorio").innerHTML = templateDelivery()

const {data:pedidos} = await db
.from("delivery_pedidos")
.select("*")

document.getElementById("pedidosTotal").innerText = pedidos.length

let faturamento = pedidos.reduce((a,p)=>a+Number(p.total||0),0)

document.getElementById("faturamentoDelivery").innerText = money(faturamento)

document.getElementById("ticketDelivery").innerText =
money(pedidos.length ? faturamento/pedidos.length : 0)

let horas = Array(24).fill(0)

pedidos.forEach(p=>{
let h=new Date(p.created_at).getHours()
horas[h]++
})

charts.hora=new Chart(
document.getElementById("graficoHoraDelivery"),
{
type:"bar",
data:{
labels:[...Array(24).keys()].map(h=>h+"h"),
datasets:[{data:horas,backgroundColor:"#3b82f6"}]
}
})

}

carregarDelivery()

</script>

</body>
</html>
