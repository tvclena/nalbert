<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Auditoria • CMV</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
minimum-scale=1,
user-scalable=no,
viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>

<style>

:root{
--primary:#111827;
--bg:#f3f5f9;
--card:#ffffff;
--text:#0f172a;
--muted:#6b7280;
--border:#e5e7eb;
--radius:12px;
}

*{box-sizing:border-box}

html,body{
margin:0;
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
}

/* HEADER */

.header{
background:#fff;
padding:6px 10px;
display:flex;
gap:6px;
align-items:center;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:50;
}

.header input,
.header select{
height:30px;
border-radius:6px;
border:1px solid var(--border);
padding:0 8px;
font-size:11px;
font-weight:600;
background:#f9fafb;
}

.header input{flex:1}

.header button{
height:30px;
padding:0 10px;
border:none;
border-radius:6px;
background:var(--primary);
color:#fff;
font-size:10px;
font-weight:700;
cursor:pointer;
}

/* CONTAINER */

.container{
padding:14px;
max-width:1100px;
margin:auto;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:14px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
padding:12px;
text-align:center;
}

.card small{
font-size:10px;
color:var(--muted);
}

.card strong{
font-size:18px;
display:block;
margin-top:4px;
}

/* CHART */

.chart-box{
background:#fff;
border:1px solid var(--border);
border-radius:var(--radius);
padding:10px;
margin-bottom:14px;
}

/* TABLE */

.table-wrap{
background:#fff;
border-radius:var(--radius);
border:1px solid var(--border);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:11px;
min-width:600px;
}

th{
background:#f9fafb;
font-size:9px;
text-transform:uppercase;
color:var(--muted);
padding:7px;
text-align:left;
}

td{
padding:7px;
border-bottom:1px solid var(--border);
}

.badge{
padding:2px 6px;
border-radius:999px;
font-size:9px;
font-weight:700;
}

.insert{background:#dcfce7;color:#166534}
.update{background:#fef9c3;color:#854d0e}
.delete{background:#fee2e2;color:#991b1b}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
padding:20px;
}

.modal-box{
background:#fff;
width:100%;
max-width:700px;
border-radius:14px;
overflow:hidden;
}

.modal-header{
padding:14px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
font-weight:700;
}

.modal-body{
padding:18px;
max-height:65vh;
overflow:auto;
}

.modal-close{
background:#f1f5f9;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

.cards{
grid-template-columns:repeat(2,1fr);
}

.header{
flex-wrap:wrap;
}

}

</style>
</head>

<body>

<div class="header">

<input type="text" id="rangeData" placeholder="Período">

<select id="filtroOperacao">
<option value="">Operação</option>
<option value="INSERT">INSERT</option>
<option value="UPDATE">UPDATE</option>
<option value="DELETE">DELETE</option>
</select>

<button onclick="carregar()">Atualizar</button>

</div>

<div class="container">

<div class="cards">

<div class="card">
<small>Total</small>
<strong id="total">0</strong>
</div>

<div class="card">
<small>Inserts</small>
<strong id="ins">0</strong>
</div>

<div class="card">
<small>Updates</small>
<strong id="upd">0</strong>
</div>

<div class="card">
<small>Deletes</small>
<strong id="del">0</strong>
</div>

</div>

<div class="chart-box">
<canvas id="grafico" height="70"></canvas>
</div>

<div class="table-wrap">

<table>

<thead>
<tr>
<th>Data</th>
<th>Tabela</th>
<th>Op</th>
<th>ID</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<div class="modal" id="modal">
<div class="modal-box">

<div class="modal-header">
Detalhes
<button class="modal-close" onclick="fechar()">Fechar</button>
</div>

<div class="modal-body" id="conteudo"></div>

</div>
</div>

<script>

const sb = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let chart;

flatpickr("#rangeData",{
mode:"range",
dateFormat:"Y-m-d",
locale:"pt"
});

async function carregar(){

let query=sb.from("historico_alteracao_fichas").select("*");

if(filtroOperacao.value){
query=query.eq("operacao",filtroOperacao.value);
}

const {data,error}=await query
.order("alterado_em",{ascending:false})
.limit(500);

if(error) return alert(error.message);

tbody.innerHTML="";

let i=0,u=0,d=0;

const dias={};

data.forEach(r=>{

const dia=r.alterado_em.slice(0,10);

if(!dias[dia]) dias[dia]=0;

dias[dia]++;

if(r.operacao==="INSERT") i++;
if(r.operacao==="UPDATE") u++;
if(r.operacao==="DELETE") d++;

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${new Date(r.alterado_em).toLocaleString()}</td>
<td>${r.tabela}</td>
<td><span class="badge ${r.operacao.toLowerCase()}">${r.operacao}</span></td>
<td>${r.registro_id}</td>
<td>
<button onclick='ver(${JSON.stringify(r)})'>Ver</button>
</td>
`;

tbody.appendChild(tr);

});

total.innerText=data.length;
ins.innerText=i;
upd.innerText=u;
del.innerText=d;

const labels=Object.keys(dias).sort();
const valores=labels.map(l=>dias[l]);

if(chart) chart.destroy();

chart=new Chart(grafico,{
type:'bar',
data:{
labels,
datasets:[{data:valores}]
},
options:{
plugins:{legend:{display:false}}
}
});

}

function ver(item){

modal.style.display="flex";

conteudo.innerHTML=`
<pre style="font-size:12px">
${JSON.stringify(item,null,2)}
</pre>
`;

}

function fechar(){
modal.style.display="none";
}

carregar();

</script>

</body>
</html>
