<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Mercatto • Prompt CMS</title>

<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>

:root{
--bg:#020617;
--card:#0f172a;
--border:#1e293b;
--text:#f1f5f9;
--muted:#94a3b8;
--green:#22c55e;
--red:#ef4444;
--blue:#3b82f6;
--radius:14px;
--shadow:0 10px 25px rgba(0,0,0,.35);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
padding:18px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.title{
font-size:22px;
font-weight:800;
}

/* BUTTON */

.btn{
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.green{background:var(--green);color:white}
.red{background:var(--red);color:white}
.blue{background:var(--blue);color:white}

/* SEARCH */

.search{
margin-bottom:18px;
}

.search input{
width:100%;
padding:13px;
border-radius:12px;
border:1px solid var(--border);
background:#020617;
color:white;
font-size:14px;
}

/* LIST */

.lista{
display:flex;
flex-direction:column;
gap:14px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
padding:18px;
cursor:grab;
box-shadow:var(--shadow);
}

.nome{
font-weight:700;
margin-bottom:6px;
}

.preview{
font-size:12px;
color:var(--muted);
white-space:pre-wrap;
max-height:120px;
overflow:hidden;
}

.acoes{
display:flex;
gap:8px;
margin-top:10px;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:999;
}

.modal-box{
background:#020617;
border:1px solid var(--border);
border-radius:16px;
width:100%;
max-width:1000px;
height:85vh;
display:flex;
flex-direction:column;
}

/* EDITOR */

.editor{
flex:1;
display:flex;
overflow:hidden;
background:#000;
}

.linhas{
width:60px;
background:#020617;
color:#64748b;
font-family:JetBrains Mono;
font-size:12px;
text-align:right;
padding:12px 6px;
overflow:hidden;
user-select:none;
}

.editor-wrapper{
position:relative;
flex:1;
}

#highlight{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;

pointer-events:none;

white-space:pre-wrap;
word-break:break-word;

font-family:JetBrains Mono;
font-size:13px;
padding:12px;
line-height:1.6;

color:#e2e8f0;
overflow:auto;
}

#highlight mark{
background:#fde047;
color:#000;
padding:1px 3px;
border-radius:4px;
}

textarea{
flex:1;
background:transparent;
border:none;
outline:none;
color:#e2e8f0;
font-family:JetBrains Mono;
font-size:13px;
padding:12px;
resize:none;
line-height:1.6;

position:relative;
z-index:2;
}

/* BUSCA POPUP */

.popup-search{
display:flex;
gap:6px;
padding:12px;
border-bottom:1px solid var(--border);
}

.popup-search input{
flex:1;
padding:8px;
border-radius:8px;
border:1px solid var(--border);
background:#020617;
color:white;
}

/* INFO */

.info{
display:flex;
justify-content:space-between;
padding:10px 14px;
font-size:12px;
color:var(--muted);
border-top:1px solid var(--border);
}

/* FOOTER */

.modal-actions{
display:flex;
gap:10px;
padding:12px;
border-top:1px solid var(--border);
}

</style>
</head>

<body>

<div class="header">
<div class="title">Prompt CMS</div>
<button class="btn green" onclick="novo()">Novo</button>
</div>

<div class="search">
<input id="buscar" placeholder="Buscar prompt">
</div>

<div id="lista" class="lista"></div>

<div id="modal" class="modal">

<div class="modal-box">

<input id="nome" placeholder="Nome do prompt" style="margin:12px">

<div class="popup-search">
<input id="buscarPopup" placeholder="Buscar dentro do prompt">
<button class="btn blue" onclick="prev()">↑</button>
<button class="btn blue" onclick="next()">↓</button>
</div>

<div class="editor">

<div id="linhas" class="linhas"></div>

<div class="editor-wrapper">

<pre id="highlight"></pre>

<textarea id="prompt"></textarea>

</div>

</div>

<div class="info">
<div id="chars">0 caracteres</div>
<div id="words">0 palavras</div>
</div>

<div class="modal-actions">
<button class="btn green" onclick="salvar()">Salvar</button>
<button class="btn red" onclick="fechar()">Cancelar</button>
</div>

</div>

</div>

<script>

const db=supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

const lista=document.getElementById("lista")
const modal=document.getElementById("modal")
const nome=document.getElementById("nome")
const prompt=document.getElementById("prompt")
const highlightLayer=document.getElementById("highlight")
const linhas=document.getElementById("linhas")
const buscar=document.getElementById("buscar")
const buscarPopup=document.getElementById("buscarPopup")

let editId=null
let dados=[]
let resultados=[]
let index=0

function atualizarLinhas(){

const total=prompt.value.split("\n").length
let html=""

for(let i=1;i<=total;i++){
html+=i+"<br>"
}

linhas.innerHTML=html

}

function atualizarHighlight(){

const termo = buscarPopup.value

if(!termo){
highlightLayer.textContent = prompt.value
resultados=[]
return
}

const regex = new RegExp(termo,"gi")

resultados=[]
let match

while((match=regex.exec(prompt.value))){
resultados.push(match.index)
}

highlightLayer.innerHTML =
prompt.value.replace(regex,m=>`<mark>${m}</mark>`)

}

function next(){

if(!resultados.length)return

index++
if(index>=resultados.length)index=0

irParaResultado()

}

function prev(){

if(!resultados.length)return

index--
if(index<0)index=resultados.length-1

irParaResultado()

}

function irParaResultado(){

const pos=resultados[index]

prompt.focus()
prompt.setSelectionRange(pos,pos+buscarPopup.value.length)

}

prompt.addEventListener("input",()=>{

chars.innerText=prompt.value.length+" caracteres"

let p=prompt.value.trim()

if(!p)p=0
else p=p.split(/\s+/).length

words.innerText=p+" palavras"

atualizarLinhas()
atualizarHighlight()

})

prompt.addEventListener("scroll",()=>{
linhas.scrollTop=prompt.scrollTop
highlightLayer.scrollTop=prompt.scrollTop
})

buscarPopup.addEventListener("input",atualizarHighlight)

async function carregar(){

const {data}=await db
.from("prompts_mercatto")
.select("*")
.order("ordem",{ascending:true})

dados=data||[]
render()

}

function render(){

lista.innerHTML=""

let filtrados=dados

if(buscar.value){

const b=buscar.value.toLowerCase()

filtrados=dados.filter(p=>
(p.nome||"").toLowerCase().includes(b)||
(p.prompt||"").toLowerCase().includes(b)
)

}

filtrados.forEach(p=>{

const card=document.createElement("div")
card.className="card"
card.dataset.id=p.id

card.innerHTML=`

<div class="nome">${p.nome}</div>

<div class="preview">${(p.prompt||"").substring(0,300)}</div>

<div class="acoes">

<button class="btn blue" onclick="editar('${p.id}')">Editar</button>

<button class="btn green" onclick="toggle('${p.id}',${p.ativo})">
${p.ativo?"Ativo":"Inativo"}
</button>

<button class="btn blue" onclick="copiar(\`${p.prompt}\`)">Copiar</button>

<button class="btn red" onclick="remover('${p.id}')">Excluir</button>

</div>
`

lista.appendChild(card)

})

ativarDrag()

}

function ativarDrag(){

new Sortable(lista,{
animation:150,
onEnd:salvarOrdem
})

}

async function salvarOrdem(){

const cards=[...document.querySelectorAll(".card")]

for(let i=0;i<cards.length;i++){

const id=cards[i].dataset.id

await db
.from("prompts_mercatto")
.update({ordem:i})
.eq("id",id)

}

carregar()

}

function novo(){
editId=null
nome.value=""
prompt.value=""
highlightLayer.textContent=""
atualizarLinhas()
abrir()
}

async function editar(id){

const {data}=await db
.from("prompts_mercatto")
.select("*")
.eq("id",id)
.single()

editId=id
nome.value=data.nome
prompt.value=data.prompt

highlightLayer.textContent=data.prompt

atualizarLinhas()

abrir()

}

async function salvar(){

const n=nome.value.trim()
const p=prompt.value.trim()

if(!n||!p){
alert("Preencha tudo")
return
}

if(editId){

await db
.from("prompts_mercatto")
.update({nome:n,prompt:p})
.eq("id",editId)

}else{

await db
.from("prompts_mercatto")
.insert({
nome:n,
prompt:p,
ativo:true,
ordem:dados.length
})

}

fechar()
carregar()

}

async function remover(id){

if(!confirm("Excluir?"))return

await db
.from("prompts_mercatto")
.delete()
.eq("id",id)

carregar()

}

async function toggle(id,a){

await db
.from("prompts_mercatto")
.update({ativo:!a})
.eq("id",id)

carregar()

}

function copiar(t){
navigator.clipboard.writeText(t)
}

function abrir(){modal.style.display="flex"}
function fechar(){modal.style.display="none"}

buscar.addEventListener("input",render)

document.addEventListener("keydown",e=>{

if(e.ctrlKey && e.key==="s"){

e.preventDefault()
salvar()

}

})

carregar()

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

</script>

</body>
</html>
