<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Executivo</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#070b14;
--card:#0f1625;
--line:#1f2937;
--text:#f1f5f9;
--muted:#94a3b8;
--accent:#7c3aed;
--radius:16px;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Inter,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HEADER */

.header{
padding:12px 16px;
border-bottom:1px solid var(--line);
display:flex;
align-items:center;
background:#070b14;
}

.search{
width:100%;
position:relative;
}

.search input{
width:100%;
padding:12px 16px;
border-radius:999px;
border:1px solid var(--line);
background:#020617;
color:white;
font-size:14px;
outline:none;
transition:.2s;
}

.search input:focus{
border-color:var(--accent);
}

/* RESULTADOS */

.results{
position:absolute;
top:46px;
left:0;
right:0;
background:#020617;
border:1px solid var(--line);
border-radius:14px;
max-height:300px;
overflow:auto;
display:none;
z-index:50;
}

.result{
padding:12px 14px;
cursor:pointer;
border-bottom:1px solid var(--line);
font-size:14px;
transition:.2s;
}

.result:hover{
background:#111827;
}

/* MAIN */

.main{
flex:1;
position:relative;
}

iframe{
width:100%;
height:100%;
border:0;
background:white;
}

/* APRESENTAÇÃO */

.welcome{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:10px;
background:#020617;
z-index:2;
transition:.5s;
}

.welcome h1{
font-size:24px;
font-weight:800;
}

.welcome p{
color:var(--muted);
font-size:13px;
}

.hidden{
opacity:0;
pointer-events:none;
}

/* LOGIN */

.login{
position:fixed;
inset:0;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.login-card{
background:#020617;
border:1px solid var(--line);
padding:36px;
border-radius:20px;
width:320px;
text-align:center;
animation:fade .6s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

.avatar{
width:84px;
height:84px;
border-radius:50%;
margin:auto;
margin-bottom:14px;
border:3px solid #1f2937;
object-fit:cover;
}

.login-title{
font-size:18px;
font-weight:700;
margin-bottom:6px;
}

.login-sub{
font-size:12px;
color:var(--muted);
margin-bottom:22px;
}

.login input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid var(--line);
background:#020617;
color:white;
margin-bottom:14px;
outline:none;
}

.login button{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:var(--accent);
color:white;
font-weight:700;
cursor:pointer;
}

.login button:hover{
opacity:.9;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="login" id="login">

<div class="login-card">

<img
class="avatar"
src="https://dxkszikemntfusfyrzos.supabase.co/storage/v1/object/sign/avatars/WhatsApp%20Image%202026-03-12%20at%2016.15.14.jpeg?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9mYTE3NDc4OC02OTE0LTQ5NDYtYTEyYi04ZWRhYzAxNDRhNDEiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJhdmF0YXJzL1doYXRzQXBwIEltYWdlIDIwMjYtMDMtMTIgYXQgMTYuMTUuMTQuanBlZyIsImlhdCI6MTc3MzM0Mjk1MywiZXhwIjoxODA0ODc4OTUzfQ.NSBf2rVIsZdCB1ORasm21y73W4r8TG6X8Yhk3ks39h0"
/>

<div class="login-title">
Sr. Nalbert Souza
</div>

<div class="login-sub">
Digite sua senha para acessar
</div>

<input
type="password"
id="senha"
placeholder="Senha"
/>

<button onclick="login()">Entrar</button>

</div>

</div>

<!-- HEADER -->

<div class="header">

<div class="search">

<input
id="search"
placeholder="Buscar dashboards..."
oninput="buscar()"
/>

<div class="results" id="results"></div>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="welcome" id="welcome">

<h1>Dashboard Central</h1>
<p>Pesquise um painel para começar</p>

</div>

<iframe id="frame"></iframe>

</div>

<script>

/* ENTER PARA LOGIN */

document.getElementById("senha").addEventListener("keypress",function(e){
if(e.key==="Enter"){
login()
}
})

/* DASHBOARDS */

const dashboards=[

{
nome:"Reservas Villa",
url:"https://grupodvbr.github.io/reserva-villa/"
},

{
nome:"Painel Requisições",
url:"https://grupodvbr.github.io/requisicoesvilla/"
},

{
nome:"Controle CMV",
url:"https://grupodvbr.github.io/cmv/"
},

{
nome:"Painel Cancelamentos",
url:"https://script.google.com/macros/s/AKfycbzM1mmixFkFE5tbC-0Evc6GVyZEJkh88HCikNK08FujRwCrgUA1e_E29nMHip81kRPoSg/exec"
},

{
nome:"Metas Financeiras",
url:"https://script.google.com/macros/s/AKfycbziCPWWJxxfrnSeT3RHsNbw21z9MfnnB8JpV7ZQcZnvUQQ7dL3lVJdpUG7epACVjFaO/exec"
}

]

const results=document.getElementById("results")

function buscar(){

const v=document.getElementById("search").value.toLowerCase()

results.innerHTML=""

if(!v){
results.style.display="none"
return
}

const filtrados=dashboards.filter(d=>
d.nome.toLowerCase().includes(v)
)

filtrados.forEach(d=>{

const el=document.createElement("div")

el.className="result"

el.innerText=d.nome

el.onclick=()=>{
abrir(d.url)
results.style.display="none"
}

results.appendChild(el)

})

results.style.display="block"

}

function abrir(url){

document.getElementById("frame").src=url

document.getElementById("welcome").classList.add("hidden")

}

/* LOGIN */

const senhaCorreta="848663"
const tempo=23*60*60*1000+59*60*1000

function login(){

const s=document.getElementById("senha").value

if(s!==senhaCorreta){
alert("Senha incorreta")
return
}

localStorage.setItem("dashboard_auth",Date.now())

document.getElementById("login").style.display="none"

}

function checkLogin(){

const t=localStorage.getItem("dashboard_auth")

if(!t) return

if(Date.now()-t>tempo){

localStorage.removeItem("dashboard_auth")
return

}

document.getElementById("login").style.display="none"

}

checkLogin()

</script>

</body>
</html>
