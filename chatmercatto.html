<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Gestor de Conversas • Mercatto Delícia</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#0f172a;
--sidebar:#111827;
--chat:#020617;
--card:#1e293b;
--border:#334155;
--text:#f1f5f9;
--muted:#94a3b8;
--brand:#22c55e;
--danger:#ef4444;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:380px;
background:var(--sidebar);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
}

.header{
padding:20px;
font-weight:800;
font-size:18px;
border-bottom:1px solid var(--border);
letter-spacing:.5px;
}

.search{
padding:14px;
border-bottom:1px solid var(--border);
}

.search input{
width:100%;
padding:12px 14px;
border-radius:10px;
border:none;
background:#020617;
color:white;
font-size:14px;
outline:none;
}

.clients{
flex:1;
overflow:auto;
}

.client{
display:flex;
gap:12px;
align-items:center;
padding:14px;
border-bottom:1px solid var(--border);
cursor:pointer;
transition:.2s;
}

.client:hover{
background:#020617;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#1e293b;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
}

.phone{
font-weight:600;
font-size:14px;
}

.preview{
font-size:12px;
color:var(--muted);
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
max-width:220px;
}

/* CHAT */

.chat{
flex:1;
display:flex;
flex-direction:column;
background:var(--chat);
}

.chat-header{
padding:18px 22px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
}

.chat-title{
font-weight:700;
font-size:15px;
}

.actions{
display:flex;
gap:10px;
}

button{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
font-size:13px;
}

.delete{
background:var(--danger);
color:white;
}

.messages{
flex:1;
overflow:auto;
padding:28px;
display:flex;
flex-direction:column;
gap:16px;
}

/* MENSAGENS */

.msg{
max-width:60%;
padding:14px 16px;
border-radius:14px;
font-size:14px;
line-height:1.5;
position:relative;
animation:fade .2s ease;
}

.user{
background:#1e293b;
align-self:flex-start;
}

.assistant{
background:#16a34a;
align-self:flex-end;
}

.time{
font-size:11px;
margin-top:6px;
opacity:.6;
text-align:right;
}

.checkbox{
position:absolute;
top:-10px;
left:-28px;
}

.empty{
margin:auto;
opacity:.5;
font-size:14px;
}

@keyframes fade{
from{opacity:0;transform:translateY(6px)}
to{opacity:1}
}

</style>
</head>

<body>

<div class="sidebar">

<div class="header">
Conversas
</div>

<div class="search">
<input id="buscar" placeholder="Buscar telefone...">
</div>

<div class="clients" id="clientes"></div>

</div>

<div class="chat">

<div class="chat-header">

<div class="chat-title" id="clienteAtual">
Selecione um cliente
</div>

<div class="actions">
<button class="delete" onclick="excluirSelecionadas()">Excluir mensagens</button>
<button class="delete" onclick="excluirConversa()">Excluir conversa</button>
</div>

</div>

<div class="messages" id="mensagens">
<div class="empty">Nenhuma conversa selecionada</div>
</div>

</div>

<script>

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let clienteSelecionado=null
let selecionadas=[]

async function carregarClientes(){

const {data} = await db
.from("conversas_whatsapp")
.select("*")
.order("created_at",{ascending:false})

const map={}

data.forEach(m=>{
if(!map[m.telefone]) map[m.telefone]=m
})

const clientes = Object.values(map)

const container=document.getElementById("clientes")
container.innerHTML=""

clientes.forEach(c=>{

const div=document.createElement("div")
div.className="client"

const inicial = c.telefone.slice(-2)

div.innerHTML=`

<div class="avatar">${inicial}</div>

<div>
<div class="phone">${c.telefone}</div>
<div class="preview">${c.mensagem}</div>
</div>

`

div.onclick=()=>abrirConversa(c.telefone)

container.appendChild(div)

})

}

async function abrirConversa(telefone){

clienteSelecionado=telefone
selecionadas=[]

document.getElementById("clienteAtual").innerText=telefone

const {data} = await db
.from("conversas_whatsapp")
.select("*")
.eq("telefone",telefone)
.order("created_at",{ascending:true})

const container=document.getElementById("mensagens")
container.innerHTML=""

data.forEach(m=>{

const div=document.createElement("div")
div.className="msg "+(m.role==="assistant"?"assistant":"user")

const date = new Date(m.created_at)
.toLocaleString("pt-BR",{hour:"2-digit",minute:"2-digit"})

div.innerHTML=`

<input type="checkbox" class="checkbox" value="${m.id}">

<div>${m.mensagem}</div>

<div class="time">${date}</div>

`

div.querySelector("input").onchange=(e)=>{

if(e.target.checked){
selecionadas.push(m.id)
}else{
selecionadas=selecionadas.filter(x=>x!==m.id)
}

}

container.appendChild(div)

})

container.scrollTop=container.scrollHeight

}

async function excluirSelecionadas(){

if(selecionadas.length===0){
alert("Selecione mensagens")
return
}

if(!confirm("Excluir mensagens selecionadas?")) return

await db
.from("conversas_whatsapp")
.delete()
.in("id",selecionadas)

abrirConversa(clienteSelecionado)

}

async function excluirConversa(){

if(!clienteSelecionado) return

if(!confirm("Excluir conversa completa?")) return

await db
.from("conversas_whatsapp")
.delete()
.eq("telefone",clienteSelecionado)

document.getElementById("mensagens").innerHTML='<div class="empty">Conversa excluída</div>'

carregarClientes()

}

document.getElementById("buscar").addEventListener("input",function(){

const filtro=this.value.toLowerCase()

document.querySelectorAll(".client").forEach(c=>{

const texto=c.innerText.toLowerCase()

c.style.display=texto.includes(filtro)?"flex":"none"

})

})

setInterval(carregarClientes,5000)

carregarClientes()

</script>

</body>
</html>
