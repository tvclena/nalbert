<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Gestor de Conversas • Mercatto Delícia</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#0f172a;
--sidebar:#111827;
--chat:#020617;
--card:#1e293b;
--border:#334155;
--text:#f1f5f9;
--muted:#94a3b8;
--brand:#22c55e;
--danger:#ef4444;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:380px;
background:var(--sidebar);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
}

.header{
padding:20px;
font-weight:800;
font-size:18px;
border-bottom:1px solid var(--border);
letter-spacing:.5px;
}

.search{
padding:14px;
border-bottom:1px solid var(--border);
}

.search input{
width:100%;
padding:12px 14px;
border-radius:10px;
border:none;
background:#020617;
color:white;
font-size:14px;
outline:none;
}

.clients{
flex:1;
overflow:auto;
}

.client{
display:flex;
gap:12px;
align-items:center;
padding:14px;
border-bottom:1px solid var(--border);
cursor:pointer;
transition:.2s;
}

.client:hover{
background:#020617;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#1e293b;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
}

.phone{
font-weight:600;
font-size:14px;
}

.preview{
font-size:12px;
color:var(--muted);
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
max-width:220px;
}

/* CHAT */

.chat{
flex:1;
display:flex;
flex-direction:column;
background:var(--chat);
}

.chat-header{
padding:18px 22px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
}

.chat-title{
font-weight:700;
font-size:15px;
}

/*.actions{
display:flex;
gap:10px;
}*/


.actions{
display:none;
}



  
button{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
font-size:13px;
}

.delete{
background:var(--danger);
color:white;
}

.messages{
flex:1;
overflow:auto;
padding:28px;
display:flex;
flex-direction:column;
gap:16px;
}

/* MENSAGENS */

.msg{
max-width:60%;
padding:14px 16px;
border-radius:14px;
font-size:14px;
line-height:1.5;
position:relative;
animation:fade .2s ease;
}

.user{
background:#1e293b;
align-self:flex-start;
}

.assistant{
background:#16a34a;
align-self:flex-end;
}

.time{
font-size:11px;
margin-top:6px;
opacity:.6;
text-align:right;
}

.checkbox{
position:absolute;
top:-10px;
left:-28px;
}

.empty{
margin:auto;
opacity:.5;
font-size:14px;
}

@keyframes fade{
from{opacity:0;transform:translateY(6px)}
to{opacity:1}
}
.waBtn{
margin-left:12px;
display:inline-flex;
align-items:center;
justify-content:center;
background:#22c55e;
border-radius:8px;
padding:6px;
}
</style>
</head>

<body>

<div class="sidebar">

<div class="header">
Conversas
</div>

<div class="search">
<input id="buscar" placeholder="Buscar telefone...">
</div>

<div class="clients" id="clientes"></div>

</div>

<div class="chat">
<div class="chat-header">

<div class="chat-title" id="clienteAtual">
Selecione um cliente
</div>

<div style="display:flex;gap:10px">

<button onclick="abrirRepertorio()" style="background:#2563eb;color:white">
📚 Repertórios
</button>

</div>
</div>

<div class="messages" id="mensagens">
<div class="empty">Nenhuma conversa selecionada</div>
</div>

</div>

<script>

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let clienteSelecionado=null
let selecionadas=[]

async function carregarClientes(){

const {data} = await db
.from("conversas_whatsapp")
.select("*")
.order("created_at",{ascending:false})

const {data:memoria} = await db
.from("memoria_clientes")
.select("telefone,nome")
const nomes={}

memoria.forEach(c=>{
nomes[c.telefone]=c.nome
})
const map={}

data.forEach(m=>{
if(!map[m.telefone]) map[m.telefone]=m
})

const clientes = Object.values(map)

const container=document.getElementById("clientes")
container.innerHTML=""

clientes.forEach(c=>{

const div=document.createElement("div")
div.className="client"

const inicial = c.telefone.slice(-2)

div.innerHTML=`

<div class="avatar">${inicial}</div>

<div>
<div class="phone">
${nomes[c.telefone] ? nomes[c.telefone] : c.telefone}
</div>

<div class="preview">${c.mensagem}</div>
</div>

`

div.onclick=()=>abrirConversa(c.telefone)

container.appendChild(div)

})

}

async function abrirConversa(telefone){

clienteSelecionado=telefone
selecionadas=[]

const {data:cliente} = await db
.from("memoria_clientes")
.select("nome")
.eq("telefone",telefone)
.single()

const nomeCliente = cliente?.nome || telefone

document.getElementById("clienteAtual").innerHTML =
`
${nomeCliente} • ${telefone}

<a href="https://wa.me/${telefone}" target="_blank" class="waBtn">
<svg viewBox="0 0 32 32" width="18">
<path fill="#25D366" d="M16 3C9 3 3.5 8.5 3.5 15.3c0 2.4.7 4.6 2 6.6L4 29l7.3-1.9c1.9 1 4 1.5 6.2 1.5 7 0 12.5-5.5 12.5-12.3C30 8.5 23 3 16 3zm6.8 17.2c-.3.8-1.7 1.6-2.4 1.7-.6.1-1.4.2-2.2-.1-.5-.2-1.2-.4-2-1-.8-.6-2.7-2.4-3.7-4.1-1-1.7-1-3.1-.7-3.6.3-.5.7-.8 1-.9.2-.1.5-.1.7-.1.2 0 .5 0 .7.5.3.6.9 2 .9 2.1.1.1.1.3 0 .4-.1.1-.2.3-.4.4-.2.2-.3.3-.5.5-.2.2-.3.3-.1.6.2.3.8 1.3 1.8 2.1 1.2 1 2.2 1.3 2.5 1.4.3.1.5.1.7-.1.2-.2.9-1 1.1-1.3.2-.3.4-.2.7-.1.3.1 1.7.8 2 .9.3.2.5.3.5.4 0 .1 0 .8-.3 1.6z"/>
</svg>
</a>
`
const {data} = await db
.from("conversas_whatsapp")
.select("*")
.eq("telefone",telefone)
.order("created_at",{ascending:true})

const container=document.getElementById("mensagens")
container.innerHTML=""

data.forEach(m=>{

const div=document.createElement("div")
div.className="msg "+(m.role==="assistant"?"assistant":"user")

const date = new Date(m.created_at)
.toLocaleString("pt-BR",{hour:"2-digit",minute:"2-digit"})

div.innerHTML=`

<div>${m.mensagem}</div>

<div class="time">${date}</div>


`


container.appendChild(div)

})

container.scrollTop=container.scrollHeight

}

async function excluirSelecionadas(){

if(selecionadas.length===0){
alert("Selecione mensagens")
return
}

if(!confirm("Excluir mensagens selecionadas?")) return

await db
.from("conversas_whatsapp")
.delete()
.in("id",selecionadas)

abrirConversa(clienteSelecionado)

}

async function excluirConversa(){

if(!clienteSelecionado) return

if(!confirm("Excluir conversa completa?")) return

await db
.from("conversas_whatsapp")
.delete()
.eq("telefone",clienteSelecionado)

document.getElementById("mensagens").innerHTML='<div class="empty">Conversa excluída</div>'

carregarClientes()

}

document.getElementById("buscar").addEventListener("input",function(){

const filtro=this.value.toLowerCase()

document.querySelectorAll(".client").forEach(c=>{

const texto=c.innerText.toLowerCase()

c.style.display=texto.includes(filtro)?"flex":"none"

})

})

setInterval(carregarClientes,5000)

carregarClientes()
function abrirRepertorio(){
document.getElementById("popupRepertorio").style.display="flex"
}

function fecharRepertorio(){
document.getElementById("popupRepertorio").style.display="none"
}

function abrirIframe(url){
document.getElementById("frameRepertorio").src=url
}
</script>
<div id="popupRepertorio" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
z-index:999;
">

<div style="
width:90%;
height:85%;
background:#020617;
border-radius:14px;
display:flex;
flex-direction:column;
overflow:hidden;
">

<div style="
padding:14px;
border-bottom:1px solid #334155;
display:flex;
justify-content:space-between;
align-items:center;
">

<b>Repertórios</b>

<button onclick="fecharRepertorio()" style="
background:#ef4444;
color:white;
border:none;
border-radius:6px;
padding:6px 12px;
cursor:pointer;
">Fechar</button>

</div>

<div style="
display:flex;
gap:10px;
padding:12px;
border-bottom:1px solid #334155;
flex-wrap:wrap;
">

<button onclick="abrirIframe('prompt.html')">Prompt de comando</button>

<button onclick="abrirIframe('conversas.html')">Conversas Pausadas</button>

<button onclick="abrirIframe('reservas.html')">Reservas</button>

<button onclick="abrirIframe('repertorio4.html')">Promoções</button>

</div>

<iframe id="frameRepertorio"
style="
flex:1;
border:none;
background:white;
"></iframe>

</div>
</div>
</body>
</html>
