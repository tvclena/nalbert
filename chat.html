<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Chat • Mercatto PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ===== BASE ===== */

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;

background:
radial-gradient(circle at 20% 30%, rgba(255,140,0,0.05), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,140,0,0.05), transparent 40%),
#f5f5f4;
}

/* ===== LOGO FUNDO ===== */

.brandBg{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:80px;
font-weight:900;
color:rgba(255,140,0,0.05);
pointer-events:none;
}

/* ===== EMPTY ===== */

.empty{
margin:auto;
color:#9ca3af;
font-weight:600;
}

/* ===== MESSAGES ===== */

.messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
z-index:2;
}

/* ===== BOLHAS ===== */

.msg{
max-width:75%;
padding:12px;
border-radius:16px;
font-size:14px;
animation:fade .2s;
}

.user{
background:#fff;
border:1px solid #e5e7eb;
align-self:flex-start;
}

.assistant{
background:#22c55e;
color:white;
align-self:flex-end;
}

/* ===== MIDIAS ===== */

.msg img{
max-width:240px;
border-radius:12px;
cursor:pointer;
margin-bottom:6px;
}

.msg video{
max-width:260px;
border-radius:12px;
margin-bottom:6px;
}

.msg audio{
width:220px;
margin-bottom:6px;
}

/* ===== DOC ===== */

.fileBox{
background:white;
border-radius:12px;
padding:10px;
display:flex;
gap:10px;
align-items:center;
cursor:pointer;
}

.fileIcon{
font-size:22px;
}

.fileName{
font-size:13px;
}

/* ===== TIME ===== */

.time{
font-size:11px;
opacity:.6;
text-align:right;
margin-top:6px;
}

/* ===== INPUT ===== */

.inputBox{
display:flex;
gap:10px;
padding:12px;
background:white;
border-top:1px solid #e5e7eb;
z-index:2;
}

textarea{
flex:1;
border-radius:10px;
border:1px solid #e5e7eb;
padding:10px;
resize:none;
height:50px;
font-family:Inter;
}

button{
background:#22c55e;
color:white;
border:none;
border-radius:10px;
padding:10px 14px;
cursor:pointer;
}

/* ===== PREVIEW ===== */

.preview{
position:absolute;
bottom:90px;
left:20px;
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
z-index:5;
}

@keyframes fade{
from{opacity:0;transform:translateY(6px)}
to{opacity:1}
}

</style>

</head>

<body>

<div class="brandBg">MERCATTO</div>

<div id="empty" class="empty">Selecione uma conversa</div>

<div id="msgs" class="messages" style="display:none"></div>

<div class="inputBox" id="inputBox" style="display:none">

<input type="file" id="fileInput" hidden>

<button onclick="fileInput.click()">📎</button>

<textarea id="msg"></textarea>

<button onclick="enviar()">Enviar</button>

</div>

<div id="preview" class="preview" style="display:none"></div>

<script>

/* ================= CONFIG ================= */

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)
/* ================= UPLOAD MIDIA (🔥 AQUI) ================= */

async function uploadMidia(file){

  const safeName = file.name.replace(/\s/g,"_")

  const fileName = Date.now() + "-" + safeName

  const { data, error } = await db.storage
    .from("buffet_whatsa_mercatto")
    .upload(fileName, file, {
      contentType: file.type,
      upsert: true
    })

  if(error){
    console.error("❌ ERRO UPLOAD:", error)
    alert("Erro ao enviar arquivo")
    return null
  }

  const { data: publicUrl } = db.storage
    .from("buffet_whatsa_mercatto")
    .getPublicUrl(fileName)

  return publicUrl.publicUrl
}

let telefone = null
let canal = null
let arquivo = null

/* ===== RESET ===== */

document.addEventListener("keydown",(e)=>{
if(e.key==="Escape") reset()
})

function reset(){
telefone=null
msgs.style.display="none"
inputBox.style.display="none"
empty.style.display="block"
msgs.innerHTML=""
}

/* ===== GET TELEFONE ===== */

function getTel(){
return new URLSearchParams(location.search).get("telefone")
}

/* ===== CARREGAR ===== */

async function carregar(){

telefone = getTel()

if(!telefone){
reset()
return
}

const {data} = await db
.from("conversas_whatsapp")
.select("*")
.eq("telefone",telefone)
.order("created_at",{ascending:true})

msgs.innerHTML=""

if(!data || !data.length){
reset()
return
}

empty.style.display="none"
msgs.style.display="flex"
inputBox.style.display="flex"

data.forEach(render)
scroll()

realtime()

}

/* ===== REALTIME ===== */

function realtime(){

if(canal) db.removeChannel(canal)

canal = db.channel("chat-"+telefone)
.on("postgres_changes",{
event:"INSERT",
schema:"public",
table:"conversas_whatsapp",
filter:`telefone=eq.${telefone}`
},p=>{
render(p.new)
scroll()
}).subscribe()

}

/* ===== RENDER ===== */

function render(m){

const div = document.createElement("div")
div.className="msg "+(m.role==="assistant"?"assistant":"user")

let html=""

/* IMAGEM */
if(m.tipo==="imagem"){
html+=`<img src="${m.media_url}" onclick="window.open('${m.media_url}')">`
}

/* VIDEO */
if(m.tipo==="video"){
html+=`<video controls src="${m.media_url}"></video>`
}

/* AUDIO */
if(m.tipo==="audio"){
html+=`<audio controls src="${m.media_url}"></audio>`
}

/* DOCUMENTO */
if(m.tipo==="documento"){
html+=`
<div class="fileBox" onclick="window.open('${m.media_url}')">
<div class="fileIcon">📄</div>
<div class="fileName">${m.nome_arquivo || "Arquivo"}</div>
</div>
`
}

/* TEXTO */
if(m.mensagem){
html+=`<div>${m.mensagem}</div>`
}

const hora = new Date(m.created_at)
.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})

div.innerHTML=html+`<div class="time">${hora}</div>`

msgs.appendChild(div)

}

/* ===== SCROLL ===== */

function scroll(){
setTimeout(()=>msgs.scrollTop=msgs.scrollHeight,50)
}

/* ===== PREVIEW ===== */

fileInput.onchange = ()=>{
arquivo = fileInput.files[0]

preview.style.display="block"

if(arquivo.type.includes("image")){
preview.innerHTML=`<img src="${URL.createObjectURL(arquivo)}" width="120">`
}else if(arquivo.type.includes("video")){
preview.innerHTML=`<video src="${URL.createObjectURL(arquivo)}" width="120" controls></video>`
}else if(arquivo.type.includes("audio")){
preview.innerHTML=`<audio src="${URL.createObjectURL(arquivo)}" controls></audio>`
}else{
preview.innerHTML=`📄 ${arquivo.name}`
}
}

/* ===== UPLOAD ===== */

async function upload(file){

const nome = Date.now()+"-"+file.name

await db.storage
.from("buffet_whatsa_mercatto")
.upload(nome,file)

const {data} = db.storage
.from("buffet_whatsa_mercatto")
.getPublicUrl(nome)

return {url:data.publicUrl,nome}
}

/* ===== ENVIAR ===== */

async function enviar(){

if(!telefone) return

const texto = msg.value.trim()

let media = null
let tipo = "texto"
let nomeArquivo = null

if(arquivo){

media = await uploadMidia(arquivo)

nomeArquivo = arquivo.name

if(arquivo.type.includes("image")) tipo="imagem"
else if(arquivo.type.includes("video")) tipo="video"
else if(arquivo.type.includes("audio")) tipo="audio"
else tipo="documento"

}
/* API (WHATSAPP) */

await fetch("/api/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
telefone,
mensagem:texto,
media_url:media,
tipo,
nome_arquivo:nomeArquivo
})
})

/* BANCO */

await db.from("conversas_whatsapp").insert({
telefone,
mensagem:texto,
tipo,
media_url:media,
nome_arquivo:nomeArquivo,
role:"assistant"
})

msg.value=""
arquivo=null
preview.style.display="none"

}

/* ===== WATCH TROCA ===== */

let last = getTel()

setInterval(()=>{
const atual = getTel()
if(atual!==last){
last=atual
carregar()
}
},400)

/* ===== INIT ===== */

carregar()

</script>

</body>
</html>
