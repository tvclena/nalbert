<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Chat • Mercatto</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ===== BASE ===== */

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
background:#e5ddd5;
color:#111;
}

/* ===== FUNDO WHATSAPP ===== */

body::before{
content:"MERCATTO";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
font-weight:800;
color:#000;
opacity:0.04;
pointer-events:none;
}

/* ===== HEADER ===== */

.header{
padding:14px 18px;
font-weight:700;
background:#075e54;
color:white;
}

/* ===== MESSAGES ===== */

.messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

/* ===== BOLHAS ===== */

.msg{
max-width:75%;
padding:10px 12px;
border-radius:10px;
font-size:14px;
position:relative;
}

.user{
background:#ffffff;
align-self:flex-start;
}

.assistant{
background:#dcf8c6;
align-self:flex-end;
}

/* ===== MIDIAS ===== */

.msg img, .msg video{
max-width:220px;
border-radius:10px;
margin-bottom:6px;
cursor:pointer;
}

.msg audio{
width:200px;
}

/* ===== DOC ===== */

.fileBox{
background:#fff;
border-radius:8px;
padding:8px;
display:flex;
gap:8px;
align-items:center;
cursor:pointer;
}

/* ===== TIME ===== */

.time{
font-size:10px;
opacity:.6;
margin-top:4px;
text-align:right;
}

/* ===== INPUT ===== */

.inputBox{
display:flex;
gap:10px;
padding:10px;
background:#f0f0f0;
border-top:1px solid #ddd;
}

textarea{
flex:1;
border-radius:20px;
border:none;
padding:10px 14px;
resize:none;
height:40px;
background:white;
}

button{
background:#25d366;
border:none;
border-radius:50%;
width:45px;
height:45px;
color:white;
cursor:pointer;
font-weight:700;
}

/* ===== PREVIEW ===== */

.preview{
position:absolute;
bottom:80px;
left:20px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

</style>

</head>

<body>

<div class="header">Mercatto • WhatsApp</div>

<div id="msgs" class="messages"></div>

<div class="inputBox">
<input type="file" id="fileInput" hidden>
<button onclick="fileInput.click()">📎</button>
<textarea id="msg" placeholder="Mensagem..."></textarea>
<button onclick="enviar()">➤</button>
</div>

<div id="preview" class="preview" style="display:none"></div>

<script>

/* ===== SUPABASE ===== */

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

/* ===== VARS ===== */

let telefone = new URLSearchParams(location.search).get("telefone")
let canal = null
let arquivo = null

let mensagensRenderizadas = new Set()

let page = 0
const limit = 20
let carregando = false
let acabou = false

/* ===== SCROLL AUTO ===== */

function scrollBottom(){
setTimeout(()=>msgs.scrollTop=msgs.scrollHeight,50)
}

/* ===== RENDER ===== */

function render(m, prepend=false){

if(mensagensRenderizadas.has(m.id)) return
mensagensRenderizadas.add(m.id)

const div = document.createElement("div")
div.className="msg "+(m.role==="assistant"?"assistant":"user")

let html=""

/* MIDIA */
if(m.tipo==="imagem"){
html+=`<img src="${m.media_url}" onclick="window.open('${m.media_url}')">`
}
if(m.tipo==="video"){
html+=`<video controls src="${m.media_url}"></video>`
}
if(m.tipo==="audio"){
html+=`<audio controls src="${m.media_url}"></audio>`
}
if(m.tipo==="documento"){
html+=`
<div class="fileBox" onclick="window.open('${m.media_url}')">
📄 ${m.nome_arquivo || "Arquivo"}
</div>`
}

/* TEXTO */
if(m.mensagem){
html+=`<div>${m.mensagem}</div>`
}

const hora = new Date(m.created_at)
.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})

div.innerHTML = html + `<div class="time">${hora}</div>`

if(prepend){
msgs.prepend(div)
}else{
msgs.appendChild(div)
}

}

/* ===== CARREGAR PAGINADO ===== */

async function carregarMais(){

if(carregando || acabou) return
carregando = true

const from = page * limit
const to = from + limit - 1

const {data} = await db
.from("conversas_whatsapp")
.select("*")
.eq("telefone",telefone)
.order("created_at",{ascending:false})
.range(from,to)

if(!data || data.length === 0){
acabou = true
carregando = false
return
}

/* inverter pra ordem correta */
data.reverse().forEach(m => render(m,true))

page++
carregando = false

}

/* ===== INIT ===== */

async function iniciar(){

await carregarMais()
scrollBottom()
realtime()

}

/* ===== SCROLL TOPO ===== */

msgs.addEventListener("scroll", async () => {
if(msgs.scrollTop < 50){
await carregarMais()
}
})

/* ===== REALTIME ===== */

function realtime(){

if(canal) db.removeChannel(canal)

canal = db.channel("chat-"+telefone)
.on("postgres_changes",{
event:"INSERT",
schema:"public",
table:"conversas_whatsapp",
filter:`telefone=eq.${telefone}`
},payload=>{
render(payload.new)
scrollBottom()
})
.subscribe()

}

/* ===== PREVIEW ===== */

fileInput.onchange = ()=>{
arquivo = fileInput.files[0]

preview.style.display="block"

if(arquivo.type.includes("image")){
preview.innerHTML=`<img src="${URL.createObjectURL(arquivo)}" width="120">`
}else if(arquivo.type.includes("video")){
preview.innerHTML=`<video src="${URL.createObjectURL(arquivo)}" width="120" controls></video>`
}else{
preview.innerHTML=`📄 ${arquivo.name}`
}
}

/* ===== UPLOAD ===== */

async function uploadMidia(file){

const nome = Date.now()+"-"+file.name

await db.storage
.from("buffet_whatsa_mercatto")
.upload(nome,file)

const {data} = db.storage
.from("buffet_whatsa_mercatto")
.getPublicUrl(nome)

return data.publicUrl

}

/* ===== ENVIAR ===== */

async function enviar(){

if(!telefone) return

const texto = msg.value.trim()

const temp = {
id:"temp-"+Date.now(),
mensagem:texto,
created_at:new Date().toISOString(),
role:"assistant"
}

render(temp)
scrollBottom()

msg.value=""

/* MIDIA */

let media=null
let tipo="texto"
let nomeArquivo=null

if(arquivo){

media = await uploadMidia(arquivo)
nomeArquivo = arquivo.name

if(arquivo.type.includes("image")) tipo="imagem"
else if(arquivo.type.includes("video")) tipo="video"
else if(arquivo.type.includes("audio")) tipo="audio"
else tipo="documento"

}

/* API */

await fetch("/api/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
telefone,
mensagem:texto,
media_url:media,
tipo,
nome_arquivo:nomeArquivo
})
})

/* BANCO */

await db.from("conversas_whatsapp").insert({
telefone,
mensagem:texto,
tipo,
media_url:media,
nome_arquivo:nomeArquivo,
role:"assistant"
})

arquivo=null
preview.style.display="none"

}

/* ===== START ===== */

iniciar()

</script>

</body>
</html>
