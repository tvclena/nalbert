<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<title>Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ================= BASE ================= */

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:Inter;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;

/* 🔥 FUNDO WHATSAPP PREMIUM */
background:
radial-gradient(circle at 20% 30%, rgba(255,140,0,0.06), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,140,0,0.06), transparent 40%),
#f5f5f4;
}

/* 🔥 MARCA CENTRAL */

.brandBg{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:70px;
font-weight:900;
color:rgba(255,140,0,0.05);
white-space:nowrap;
pointer-events:none;
}

/* ================= EMPTY STATE ================= */

.emptyState{
margin:auto;
text-align:center;
z-index:2;
}

.emptyState h1{
font-size:20px;
color:#9ca3af;
font-weight:600;
}

/* ================= CHAT ================= */

.messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
z-index:2;
}

/* BOLHAS */

.msg{
max-width:70%;
padding:14px 16px;
border-radius:16px;
font-size:14px;
line-height:1.5;
animation:fade .2s ease;
}

/* RECEBIDA */

.user{
background:#ffffff;
align-self:flex-start;
color:#111827;
border:1px solid #e5e7eb;
}

/* ENVIADA */

.assistant{
background:#22c55e;
align-self:flex-end;
color:white;
}

/* TIME */

.time{
font-size:11px;
opacity:.6;
margin-top:6px;
text-align:right;
}

/* ANIMAÇÃO */

@keyframes fade{
from{opacity:0;transform:translateY(6px)}
to{opacity:1}
}

/* SCROLL */

::-webkit-scrollbar{
width:5px;
}

::-webkit-scrollbar-thumb{
background:#d1d5db;
border-radius:10px;
}

</style>

</head>

<body>

<div class="brandBg">MERCATTO DELÍCIA</div>

<div id="empty" class="emptyState">
<h1>Selecione uma conversa</h1>
</div>

<div class="messages" id="msgs" style="display:none"></div>

<script>

/* ================= CONFIG ================= */

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

/* ================= PARAM ================= */

let canalRealtime = null

function getTelefone(){
  const urlParams = new URLSearchParams(window.location.search)
  return urlParams.get("telefone")
}

let telefone = getTelefone()

/* ================= RESET ================= */

document.addEventListener("keydown", (e)=>{
  if(e.key === "Escape"){
    resetarTela()
  }
})

function resetarTela(){

  telefone = null

  document.getElementById("msgs").style.display = "none"
  document.getElementById("msgs").innerHTML = ""

  document.getElementById("empty").style.display = "block"

  if(canalRealtime){
    db.removeChannel(canalRealtime)
    canalRealtime = null
  }
}

/* ================= CARREGAR ================= */

async function carregar(){

  telefone = getTelefone()

  if(!telefone){
    resetarTela()
    return
  }

  const {data,error} = await db
  .from("conversas_whatsapp")
  .select("*")
  .eq("telefone", telefone)
  .order("created_at",{ascending:true})

  if(error){
    console.error(error)
    return
  }

  const container = document.getElementById("msgs")
  container.innerHTML = ""

  if(!data || data.length === 0){
    resetarTela()
    return
  }

  document.getElementById("empty").style.display = "none"
  container.style.display = "flex"

  data.forEach(m=>render(m))

  scrollFinal()

  iniciarRealtime()
}

/* ================= REALTIME DINÂMICO ================= */

function iniciarRealtime(){

  if(canalRealtime){
    db.removeChannel(canalRealtime)
  }

  canalRealtime = db
  .channel("chat-"+telefone)
  .on(
    "postgres_changes",
    {
      event:"INSERT",
      schema:"public",
      table:"conversas_whatsapp",
      filter:`telefone=eq.${telefone}`
    },
    payload=>{
      render(payload.new)
      scrollFinal()
    }
  )
  .subscribe()

}

/* ================= RENDER ================= */

function render(m){

  const container = document.getElementById("msgs")

  const div = document.createElement("div")
  div.className = "msg " + (m.role === "assistant" ? "assistant" : "user")

  const date = new Date(m.created_at)

  const hora = date.toLocaleTimeString("pt-BR",{
    hour:"2-digit",
    minute:"2-digit"
  })

  let conteudo = ""

  /* TEXTO */
  if(m.tipo === "texto" || !m.tipo){
    conteudo += `<div>${m.mensagem || ""}</div>`
  }

  /* IMAGEM */
  if(m.tipo === "imagem" && m.media_url){
    conteudo += `
      <img src="${m.media_url}" 
      onerror="this.style.display='none'"
      style="
        max-width:240px;
        border-radius:14px;
        margin-bottom:6px;
        cursor:pointer;
        box-shadow:0 8px 20px rgba(0,0,0,0.15);
      "
      onclick="window.open('${m.media_url}')">
    `
  }

  /* VIDEO */
  if(m.tipo === "video" && m.media_url){
    conteudo += `
      <video controls style="
        max-width:260px;
        border-radius:14px;
        margin-bottom:6px;
        box-shadow:0 8px 20px rgba(0,0,0,0.15);
      ">
        <source src="${m.media_url}">
      </video>
    `
  }

  /* TEXTO JUNTO */
  if(m.mensagem){
    conteudo += `<div>${m.mensagem}</div>`
  }

  div.innerHTML = `
    ${conteudo}
    <div class="time">${hora}</div>
  `

  container.appendChild(div)
}

/* ================= SCROLL ================= */

function scrollFinal(){
  const container = document.getElementById("msgs")

  setTimeout(()=>{
    container.scrollTop = container.scrollHeight
  },50)
}

/* ================= OBSERVADOR (🔥 TROCA AUTOMÁTICA) ================= */

/* detecta quando muda o telefone no iframe */

let ultimoTelefone = telefone

setInterval(()=>{
  const novo = getTelefone()

  if(novo !== ultimoTelefone){
    ultimoTelefone = novo
    carregar()
  }
},500)

/* ================= INIT ================= */

carregar()

/* ================= UPLOAD ================= */

async function uploadMidia(file){

  const fileName = Date.now() + "-" + file.name

  const { error } = await db.storage
    .from("buffet_whatsa_mercatto")
    .upload(fileName, file)

  if(error){
    console.error(error)
    return null
  }

  const { data } = db.storage
    .from("buffet_whatsa_mercatto")
    .getPublicUrl(fileName)

  return data.publicUrl
}

</script>
</body>
</html>
