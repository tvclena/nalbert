<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Chat • Mercatto PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ===== BASE ===== */

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
height:100vh;
display:flex;
background:#f5f5f4;
}

/* ===== SIDEBAR ===== */

.sidebar{
width:320px;
background:#111827;
color:white;
display:flex;
flex-direction:column;
}

.sidebar h2{
padding:16px;
margin:0;
font-size:16px;
border-bottom:1px solid #374151;
}

.chatItem{
padding:14px;
border-bottom:1px solid #374151;
cursor:pointer;
}

.chatItem:hover{
background:#1f2937;
}

/* ===== CHAT ===== */

.chat{
flex:1;
display:flex;
flex-direction:column;
position:relative;
}

.brand{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:#00000010;
}

/* ===== MESSAGES ===== */

.messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

/* ===== BUBBLES ===== */

.msg{
max-width:70%;
padding:12px;
border-radius:14px;
font-size:14px;
}

.user{
background:#fff;
border:1px solid #e5e7eb;
align-self:flex-start;
}

.assistant{
background:#22c55e;
color:white;
align-self:flex-end;
}

/* ===== INPUT ===== */

.input{
display:flex;
padding:10px;
gap:10px;
border-top:1px solid #e5e7eb;
background:white;
}

textarea{
flex:1;
border-radius:10px;
border:1px solid #ddd;
padding:10px;
resize:none;
}

button{
background:#22c55e;
color:white;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Conversas</h2>
<div id="lista"></div>
</div>

<!-- CHAT -->
<div class="chat">

<div class="brand" id="brand">Selecione uma conversa</div>

<div id="msgs" class="messages"></div>

<div class="input" id="inputBox" style="display:none">
<input type="file" id="fileInput" hidden>
<button onclick="fileInput.click()">📎</button>
<textarea id="msg"></textarea>
<button onclick="enviar()">Enviar</button>
</div>

</div>

<script>

/* ================= CONFIG ================= */

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"SEU_TOKEN"
)

/* ================= VAR ================= */

let telefone = null
let page = 0
let loading = false
let canal = null
let ids = new Set()
let arquivo = null

/* ================= LISTA ================= */

async function carregarConversas(){

const { data } = await db
.from("conversas_whatsapp")
.select("telefone")
.order("created_at",{ascending:false})

const unicos = [...new Set(data.map(i=>i.telefone))]

lista.innerHTML=""

unicos.forEach(t=>{

const div = document.createElement("div")
div.className="chatItem"
div.innerText = t

div.onclick = ()=>abrirChat(t)

lista.appendChild(div)

})

}

/* ================= ABRIR CHAT ================= */

async function abrirChat(t){

telefone = t
page = 0
ids.clear()

brand.style.display="none"
inputBox.style.display="flex"
msgs.innerHTML=""

await carregarMais(true)
realtime()

}

/* ================= PAGINAÇÃO ================= */

async function carregarMais(initial=false){

if(loading) return
loading = true

const from = page*20
const to = from+19

const { data } = await db
.from("conversas_whatsapp")
.select("*")
.eq("telefone",telefone)
.order("created_at",{ascending:false})
.range(from,to)

data.reverse().forEach(renderTopo)

if(initial) scrollFinal()

page++
loading=false

}

/* ================= SCROLL ================= */

msgs.onscroll = async ()=>{
if(msgs.scrollTop < 50){
await carregarMais()
}
}

/* ================= REALTIME ================= */

function realtime(){

if(canal) db.removeChannel(canal)

canal = db.channel("chat-"+telefone)
.on("postgres_changes",{
event:"INSERT",
schema:"public",
table:"conversas_whatsapp",
filter:`telefone=eq.${telefone}`
},payload=>{
const m = payload.new
if(ids.has(m.id)) return
render(m)
scrollFinal()
})
.subscribe()

}

/* ================= RENDER ================= */

function render(m){

if(ids.has(m.id)) return
ids.add(m.id)

msgs.appendChild(montar(m))

}

function renderTopo(m){

if(ids.has(m.id)) return
ids.add(m.id)

msgs.prepend(montar(m))

}

function montar(m){

const div = document.createElement("div")
div.className="msg "+(m.role==="assistant"?"assistant":"user")

let html=""

if(m.tipo==="imagem") html+=`<img src="${m.media_url}" width="200">`
if(m.tipo==="video") html+=`<video src="${m.media_url}" width="200" controls></video>`
if(m.tipo==="audio") html+=`<audio src="${m.media_url}" controls></audio>`

if(m.tipo==="documento"){
html+=`<div onclick="window.open('${m.media_url}')">📄 ${m.nome_arquivo}</div>`
}

if(m.mensagem) html+=`<div>${m.mensagem}</div>`

div.innerHTML = html

return div
}

/* ================= SCROLL FINAL ================= */

function scrollFinal(){
setTimeout(()=>msgs.scrollTop = msgs.scrollHeight,50)
}

/* ================= UPLOAD ================= */

async function uploadMidia(file){

const name = Date.now()+"-"+file.name

await db.storage.from("media-chat").upload(name,file)

const { data } = db.storage.from("media-chat").getPublicUrl(name)

return data.publicUrl
}

/* ================= ENVIAR ================= */

async function enviar(){

const texto = msg.value.trim()

let media=null, tipo="texto", nome=null

if(arquivo){

media = await uploadMidia(arquivo)
nome = arquivo.name

if(arquivo.type.includes("image")) tipo="imagem"
else if(arquivo.type.includes("video")) tipo="video"
else if(arquivo.type.includes("audio")) tipo="audio"
else tipo="documento"

}

await fetch("/api/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
telefone,
mensagem:texto || null,
media_url:media,
tipo,
nome_arquivo:nome
})
})

msg.value=""
arquivo=null

}

/* ================= FILE ================= */

fileInput.onchange = ()=>{
arquivo = fileInput.files[0]
}

/* ================= INIT ================= */

carregarConversas()

</script>

</body>
</html>
