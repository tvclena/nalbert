<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Chat • Mercatto PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ===== BASE ===== */

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;

background:
radial-gradient(circle at 20% 30%, rgba(255,140,0,0.05), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,140,0,0.05), transparent 40%),
#f5f5f4;
}

/* ===== LOGO ===== */

.brandBg{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:70px;
font-weight:900;
color:rgba(255,140,0,0.05);
pointer-events:none;
}

/* ===== MESSAGES ===== */

.messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

/* ===== BOLHAS ===== */

.msg{
max-width:75%;
padding:12px;
border-radius:16px;
font-size:14px;
animation:fade .2s ease;
}

.user{
background:#fff;
border:1px solid #e5e7eb;
align-self:flex-start;
}

.assistant{
background:#22c55e;
color:white;
align-self:flex-end;
}

/* ===== MIDIAS ===== */

.msg img,
.msg video{
max-width:240px;
border-radius:12px;
margin-bottom:6px;
}

.msg audio{
width:200px;
}

/* ===== FILE ===== */

.fileBox{
background:#fff;
padding:10px;
border-radius:12px;
display:flex;
gap:10px;
cursor:pointer;
}

/* ===== INPUT ===== */

.inputBox{
display:flex;
gap:10px;
padding:10px;
background:#fff;
border-top:1px solid #e5e7eb;
}

textarea{
flex:1;
resize:none;
border-radius:10px;
padding:10px;
border:1px solid #ddd;
}

button{
background:#22c55e;
color:#fff;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
}

.preview{
position:absolute;
bottom:90px;
left:20px;
background:#fff;
padding:10px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
display:none;
}

@keyframes fade{
from{opacity:0;transform:translateY(5px)}
to{opacity:1}
}

</style>

</head>

<body>

<div class="brandBg">MERCATTO</div>

<div id="msgs" class="messages"></div>

<div class="inputBox">
<input type="file" id="fileInput" hidden>
<button onclick="fileInput.click()">📎</button>
<textarea id="msg"></textarea>
<button onclick="enviar()">Enviar</button>
</div>

<div id="preview" class="preview"></div>

<script>

/* ================= CONFIG ================= */

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"SEU_TOKEN"
)

/* ================= VAR ================= */

let telefone = new URLSearchParams(location.search).get("telefone")
let canal = null
let arquivo = null
let page = 0
let loading = false
let mensagensIds = new Set()

/* ================= UPLOAD ================= */

async function uploadMidia(file){

const fileName = Date.now()+"-"+file.name.replace(/\s/g,"_")

const { error } = await db.storage
.from("media-chat")
.upload(fileName, file, { upsert:true })

if(error){
alert("Erro upload")
return null
}

const { data } = db.storage
.from("media-chat")
.getPublicUrl(fileName)

return data.publicUrl
}

/* ================= LOAD ================= */

async function carregarInicial(){

msgs.innerHTML=""
mensagensIds.clear()
page = 0

await carregarMais(true)

realtime()
}

/* ================= PAGINAÇÃO ================= */

async function carregarMais(initial=false){

if(loading) return
loading = true

const from = page * 20
const to = from + 19

const { data } = await db
.from("conversas_whatsapp")
.select("*")
.eq("telefone", telefone)
.order("created_at",{ascending:false})
.range(from,to)

if(!data) return

data.reverse().forEach(renderTopo)

if(initial) scrollFinal()

page++
loading = false
}

/* ================= SCROLL INFINITO ================= */

msgs.addEventListener("scroll", async ()=>{

if(msgs.scrollTop < 50){
await carregarMais()
}

})

/* ================= REALTIME ================= */

function realtime(){

if(canal) db.removeChannel(canal)

canal = db.channel("chat-"+telefone)
.on("postgres_changes",{
event:"INSERT",
schema:"public",
table:"conversas_whatsapp",
filter:`telefone=eq.${telefone}`
},payload=>{

const m = payload.new

if(mensagensIds.has(m.id)) return

render(m)
scrollFinal()

})
.subscribe()

}

/* ================= RENDER ================= */

function render(m){

if(mensagensIds.has(m.id)) return
mensagensIds.add(m.id)

const div = montarMsg(m)

msgs.appendChild(div)
}

function renderTopo(m){

if(mensagensIds.has(m.id)) return
mensagensIds.add(m.id)

const div = montarMsg(m)

msgs.prepend(div)
}

/* ================= COMPONENTE ================= */

function montarMsg(m){

const div = document.createElement("div")
div.className="msg "+(m.role==="assistant"?"assistant":"user")

let html=""

if(m.tipo==="imagem") html+=`<img src="${m.media_url}">`
if(m.tipo==="video") html+=`<video controls src="${m.media_url}"></video>`
if(m.tipo==="audio") html+=`<audio controls src="${m.media_url}"></audio>`

if(m.tipo==="documento"){
html+=`
<div class="fileBox" onclick="window.open('${m.media_url}')">
📄 ${m.nome_arquivo || "Arquivo"}
</div>`
}

if(m.mensagem) html+=`<div>${m.mensagem}</div>`

div.innerHTML = html

return div
}

/* ================= SCROLL ================= */

function scrollFinal(){
setTimeout(()=>msgs.scrollTop = msgs.scrollHeight,50)
}

/* ================= PREVIEW ================= */

fileInput.onchange = ()=>{
arquivo = fileInput.files[0]

preview.style.display="block"
preview.innerHTML = arquivo.name
}

/* ================= ENVIAR ================= */

async function enviar(){

const texto = msg.value.trim()

let media = null
let tipo = "texto"
let nomeArquivo = null

if(arquivo){

media = await uploadMidia(arquivo)

if(!media) return

nomeArquivo = arquivo.name

if(arquivo.type.includes("image")) tipo="imagem"
else if(arquivo.type.includes("video")) tipo="video"
else if(arquivo.type.includes("audio")) tipo="audio"
else tipo="documento"

}

await fetch("/api/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
telefone,
mensagem: texto || null,
media_url: media,
tipo,
nome_arquivo:nomeArquivo
})
})

msg.value=""
arquivo=null
preview.style.display="none"
}

/* ================= INIT ================= */

carregarInicial()

</script>

</body>
</html>
