<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Chat • Mercatto PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ===== BASE ===== */

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
background:#0b0f1a;
color:white;
}

/* ===== HEADER ===== */

.header{
padding:14px 18px;
font-weight:700;
background:linear-gradient(90deg,#22c55e,#16a34a);
}

/* ===== MESSAGES ===== */

.messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
scroll-behavior:smooth;
}

/* ===== BOLHAS ===== */

.msg{
max-width:75%;
padding:12px 14px;
border-radius:16px;
font-size:14px;
animation:fade .2s ease;
position:relative;
}

.user{
background:#1e293b;
align-self:flex-start;
border:1px solid #334155;
}

.assistant{
background:#22c55e;
color:white;
align-self:flex-end;
}

/* ===== MIDIAS ===== */

.msg img, .msg video{
max-width:240px;
border-radius:12px;
margin-bottom:6px;
cursor:pointer;
}

.msg audio{
width:220px;
margin-bottom:6px;
}

/* ===== DOC ===== */

.fileBox{
background:#1e293b;
border-radius:10px;
padding:10px;
display:flex;
gap:10px;
align-items:center;
cursor:pointer;
}

.fileIcon{
font-size:20px;
}

/* ===== TIME ===== */

.time{
font-size:10px;
opacity:.6;
margin-top:4px;
text-align:right;
}

/* ===== INPUT ===== */

.inputBox{
display:flex;
gap:10px;
padding:10px;
background:#020617;
border-top:1px solid #1e293b;
}

textarea{
flex:1;
border-radius:10px;
border:none;
padding:10px;
resize:none;
height:45px;
background:#1e293b;
color:white;
}

button{
background:#22c55e;
border:none;
border-radius:10px;
padding:10px 14px;
color:white;
cursor:pointer;
font-weight:600;
}

/* ===== PREVIEW ===== */

.preview{
position:absolute;
bottom:80px;
left:20px;
background:#020617;
padding:10px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.5);
}

/* ===== ANIMAÇÃO ===== */

@keyframes fade{
from{opacity:0;transform:translateY(6px)}
to{opacity:1}
}

</style>

</head>

<body>

<div class="header">Chat • Mercatto</div>

<div id="msgs" class="messages"></div>

<div class="inputBox">

<input type="file" id="fileInput" hidden>

<button onclick="fileInput.click()">📎</button>

<textarea id="msg" placeholder="Digite..."></textarea>

<button onclick="enviar()">Enviar</button>

</div>

<div id="preview" class="preview" style="display:none"></div>

<script>

/* ===== SUPABASE ===== */

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

/* ===== VARS ===== */

let telefone = new URLSearchParams(location.search).get("telefone")
let canal = null
let arquivo = null
let mensagensRenderizadas = new Set()

/* ===== SCROLL ===== */

function scroll(){
setTimeout(()=>msgs.scrollTop=msgs.scrollHeight,50)
}

/* ===== RENDER ===== */

function render(m){

if(mensagensRenderizadas.has(m.id)) return
mensagensRenderizadas.add(m.id)

const div = document.createElement("div")
div.className="msg "+(m.role==="assistant"?"assistant":"user")

let html=""

/* MIDIA */
if(m.tipo==="imagem"){
html+=`<img src="${m.media_url}" onclick="window.open('${m.media_url}')">`
}
if(m.tipo==="video"){
html+=`<video controls src="${m.media_url}"></video>`
}
if(m.tipo==="audio"){
html+=`<audio controls src="${m.media_url}"></audio>`
}
if(m.tipo==="documento"){
html+=`
<div class="fileBox" onclick="window.open('${m.media_url}')">
<div class="fileIcon">📄</div>
<div>${m.nome_arquivo || "Arquivo"}</div>
</div>`
}

/* TEXTO */
if(m.mensagem){
html+=`<div>${m.mensagem}</div>`
}

const hora = new Date(m.created_at)
.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})

div.innerHTML = html + `<div class="time">${hora}</div>`

msgs.appendChild(div)

}

/* ===== CARREGAR ===== */

async function carregar(){

mensagensRenderizadas.clear()

const {data} = await db
.from("conversas_whatsapp")
.select("*")
.eq("telefone",telefone)
.order("created_at",{ascending:true})

msgs.innerHTML=""

data.forEach(render)

scroll()

realtime()

}

/* ===== REALTIME ===== */

function realtime(){

if(canal) db.removeChannel(canal)

canal = db.channel("chat-"+telefone)
.on("postgres_changes",{
event:"INSERT",
schema:"public",
table:"conversas_whatsapp",
filter:`telefone=eq.${telefone}`
},payload=>{
render(payload.new)
scroll()
})
.subscribe()

}

/* ===== PREVIEW ===== */

fileInput.onchange = ()=>{
arquivo = fileInput.files[0]

preview.style.display="block"

if(arquivo.type.includes("image")){
preview.innerHTML=`<img src="${URL.createObjectURL(arquivo)}" width="120">`
}else if(arquivo.type.includes("video")){
preview.innerHTML=`<video src="${URL.createObjectURL(arquivo)}" width="120" controls></video>`
}else{
preview.innerHTML=`📄 ${arquivo.name}`
}
}

/* ===== UPLOAD ===== */

async function uploadMidia(file){

const nome = Date.now()+"-"+file.name

await db.storage
.from("buffet_whatsa_mercatto")
.upload(nome,file)

const {data} = db.storage
.from("buffet_whatsa_mercatto")
.getPublicUrl(nome)

return data.publicUrl

}

/* ===== ENVIAR ===== */

async function enviar(){

if(!telefone) return

const texto = msg.value.trim()

/* UX IMEDIATO */

const temp = {
id:"temp-"+Date.now(),
mensagem:texto,
created_at:new Date().toISOString(),
role:"assistant"
}

render(temp)
scroll()

msg.value=""

/* MIDIA */

let media=null
let tipo="texto"
let nomeArquivo=null

if(arquivo){

media = await uploadMidia(arquivo)
nomeArquivo = arquivo.name

if(arquivo.type.includes("image")) tipo="imagem"
else if(arquivo.type.includes("video")) tipo="video"
else if(arquivo.type.includes("audio")) tipo="audio"
else tipo="documento"

}

/* API */

await fetch("/api/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
telefone,
mensagem:texto,
media_url:media,
tipo,
nome_arquivo:nomeArquivo
})
})

/* BANCO */

await db.from("conversas_whatsapp").insert({
telefone,
mensagem:texto,
tipo,
media_url:media,
nome_arquivo:nomeArquivo,
role:"assistant"
})

arquivo=null
preview.style.display="none"

}

/* ===== INIT ===== */

carregar()

</script>

</body>
</html>
